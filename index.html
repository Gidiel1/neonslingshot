    function challengeForReward(kind, id) {
      const rewardKey = kind === "color" ? "rewardColor" : kind === "shape" ? "rewardShape" : "rewardTrail";
      return challenges.find((challenge) => challenge[rewardKey] === id);
    }

    function shopItemData(kind, id) {
      if (kind === "color") {
        const color = playerColors.find((item) => item.id === id);
        if (!color) return null;
        return {
          kind,
          id,
          name: color.name,
          price: color.price,
          special: color.special,
          swatch: color.glow,
          specialClass: color.id === "chroma"
        };
      }
      if (kind === "shape") {
        const shape = playerShapes.find((item) => item.id === id);
        if (!shape) return null;
        return { kind, id, name: shape.name, price: shape.price, special: shape.special };
      }
      const trail = playerTrails.find((item) => item.id === id);
      if (!trail) return null;
      return { kind, id, name: trail.name, price: trail.price, special: trail.special };
    }

    function openShopDialog(kind, id) {
      const item = shopItemData(kind, id);
      if (!item) return;
      pendingShopItem = { kind, id };
      colorBuyPreview.className = "shop-preview";
      colorBuyPreview.style.removeProperty("--swatch");
      colorBuyPreview.textContent = "";
      colorBuyPreview.style.setProperty("--swatch", item.swatch || "rgba(53, 234, 255, 0.48)");
      colorBuyPreview.classList.toggle("special-color", Boolean(item.specialClass));
      if (kind === "shape" || kind === "trail") {
        colorBuyPreview.style.setProperty("--swatch", "rgba(244, 251, 255, 0.04)");
        const canvasEl = document.createElement("canvas");
        canvasEl.width = 128;
        canvasEl.height = 96;
        colorBuyPreview.appendChild(canvasEl);
        const previewCtx = canvasEl.getContext("2d");
        const previewColor = playerColors[0];
        const time = performance.now();
        previewCtx.save();
        if (kind === "shape") {
          previewCtx.translate(canvasEl.width / 2, canvasEl.height / 2);
          previewCtx.shadowBlur = 12;
          previewCtx.shadowColor = previewColor.glow;
          previewCtx.fillStyle = previewColor.core;
          drawPlayerShape(id, 28, time, previewCtx);
          previewCtx.fill();
          previewCtx.lineWidth = 3;
          previewCtx.strokeStyle = previewColor.glow;
          previewCtx.stroke();
          drawPlayerShapeDetails(id, 28, time, previewColor, previewCtx);
        } else {
          for (let i = 8; i >= 0; i--) {
            const x = 22 + i * 11;
            const y = canvasEl.height / 2 + Math.sin(i * 0.8 + time / 260) * 9;
            const alpha = (1 - i / 10) * 0.72;
            drawTrailStyle(previewCtx, id, x, y, 14 - i * 0.7, alpha, i, time);
          }
        }
        previewCtx.restore();
      }
      colorBuyTitle.textContent = item.name;

      const challenge = challengeForReward(kind, id);
      if (challenge) {
        colorBuyPrice.textContent = `Challenge: ${challenge.description}`;
        buyColorButton.textContent = "Gesperrt";
        buyColorButton.disabled = true;
      } else if (Number.isFinite(item.price)) {
        colorBuyPrice.textContent = `★ ${item.price}`;
        buyColorButton.textContent = state.totalStars >= item.price ? "Kaufen" : "Zu wenig Sterne";
        buyColorButton.disabled = state.totalStars < item.price;
      } else if (kind === "trail" && id === "rainbow") {
        colorBuyPrice.textContent = "Zerstöre einen extrem seltenen Rainbow-Planeten in Classic, Items oder Flow.";
        buyColorButton.textContent = "Gesperrt";
        buyColorButton.disabled = true;
      } else {
        colorBuyPrice.textContent = "Nicht freigeschaltet";
        buyColorButton.textContent = "Gesperrt";
        buyColorButton.disabled = true;
      }
      colorBuyDialog.hidden = false;
    }

    function previewPendingShopItem() {
      if (!pendingShopItem) return;
      previewSkinOverrides[pendingShopItem.kind] = pendingShopItem.id;
      closeColorDialog();
      drawSkinComboPreview();
    }

    function closeColorDialog() {
      pendingShopItem = null;
      colorBuyDialog.hidden = true;
    }

    function selectColor(colorId) {
      if (!state.unlockedColors.has(colorId)) {
        openShopDialog("color", colorId);
        return;
      }
      state.selectedColor = colorId;
      previewSkinOverrides.color = null;
      saveColorState();
      renderSkinShop();
    }

    function buyPendingColor() {
      if (!pendingShopItem) return;
      const item = shopItemData(pendingShopItem.kind, pendingShopItem.id);
      if (!item || !Number.isFinite(item.price) || state.totalStars < item.price) return;
      if (challengeForReward(item.kind, item.id)) return;
      state.totalStars -= item.price;
      if (item.kind === "color") {
        state.unlockedColors.add(item.id);
        state.selectedColor = item.id;
        saveColorState();
      } else if (item.kind === "shape") {
        state.unlockedShapes.add(item.id);
        state.selectedShape = item.id;
        saveShapeState();
      } else {
        state.unlockedTrails.add(item.id);
        state.selectedTrail = item.id;
        saveTrailState();
      }
      previewSkinOverrides[item.kind] = null;
      saveStars();
      scheduleCloudSave({ immediate: true });
      updateHud();
      renderSkinShop();
      closeColorDialog();
    }

    function syncViewportSize() {
      const visual = window.visualViewport;
      const width = visual?.width || window.innerWidth || WORLD_WIDTH;
      const height = visual?.height || window.innerHeight || WORLD_HEIGHT;
      const touchBrowser = window.matchMedia("(hover: none), (pointer: coarse)").matches;
      const safeTop = touchBrowser ? 4 : 0;
      const safeBottom = touchBrowser ? 2 : 0;
      document.documentElement.style.setProperty("--app-width", `${width}px`);
      document.documentElement.style.setProperty("--app-height", `${height}px`);
      document.documentElement.style.setProperty("--browser-safe-top", `${safeTop}px`);
      document.documentElement.style.setProperty("--browser-safe-bottom", `${safeBottom}px`);
    }

    function resize() {
      syncViewportSize();
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      const rect = gameShell.getBoundingClientRect();
      const viewWidth = Math.max(1, rect.width || window.innerWidth || WORLD_WIDTH);
      const viewHeight = Math.max(1, rect.height || window.innerHeight || WORLD_HEIGHT);
      const worldWidth = WORLD_WIDTH;
      const worldHeight = (viewHeight / viewWidth) * worldWidth;
      const scale = viewWidth / worldWidth;
      state.dpr = dpr;
      const oldWidth = state.width;
      const oldHeight = state.height;
      state.width = worldWidth;
      state.height = worldHeight;
      state.viewWidth = viewWidth;
      state.viewHeight = viewHeight;
      state.renderScale = scale;
      canvas.width = Math.floor(viewWidth * dpr);
      canvas.height = Math.floor(viewHeight * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      if (!state.running) {
        state.player.x = state.width * 0.5;
        state.player.y = state.height * 0.58;
      } else {
        state.player.x = clamp(state.player.x, state.player.r, state.width - state.player.r);
        state.player.y = clamp(state.player.y, state.player.r, state.height - state.player.r);
        for (const enemy of state.enemies) {
          if (oldWidth > 0 && oldHeight > 0) {
            enemy.x = (enemy.x / oldWidth) * state.width;
            enemy.y = (enemy.y / oldHeight) * state.height;
          }
        }
        for (const warning of state.meteorWarnings) {
          if (oldWidth > 0 && oldHeight > 0) {
            warning.meteor.x = (warning.meteor.x / oldWidth) * state.width;
            warning.meteor.y = (warning.meteor.y / oldHeight) * state.height;
            warning.meteor.warningX = clamp((warning.meteor.warningX / oldWidth) * state.width, 18, state.width - 18);
            warning.meteor.warningY = clamp((warning.meteor.warningY / oldHeight) * state.height, 18, state.height - 18);
          }
        }
        for (const collectible of state.collectibles) {
          if (oldWidth > 0 && oldHeight > 0) {
            collectible.x = (collectible.x / oldWidth) * state.width;
            collectible.y = (collectible.y / oldHeight) * state.height;
          }
        }
        for (const mine of state.mines) {
          if (oldWidth > 0 && oldHeight > 0) {
            mine.x = (mine.x / oldWidth) * state.width;
            mine.y = (mine.y / oldHeight) * state.height;
            mine.targetX = (mine.targetX / oldWidth) * state.width;
            mine.targetY = (mine.targetY / oldHeight) * state.height;
          }
        }
        for (const pair of state.starPairs) {
          if (oldWidth > 0 && oldHeight > 0) {
            pair.x = (pair.x / oldWidth) * state.width;
            pair.y = (pair.y / oldHeight) * state.height;
          }
        }
      }
      buildStars();
    }

    function buildStars() {
      const count = Math.floor((state.width * state.height) / 16000);
      state.stars = Array.from({ length: clamp(count, 28, 120) }, () => ({
        x: Math.random() * state.width,
        y: Math.random() * state.height,
        size: rand(0.6, 1.9),
        speed: rand(4, 18),
        alpha: rand(0.2, 0.8)
      }));
    }

    function showScreen(screenId) {
      const previousScreen = state.screen;
      screens.forEach((screen) => {
        screen.hidden = screen.id !== screenId;
      });
      gameHud.hidden = screenId !== "gameScreen";
      pauseButton.hidden = screenId !== "gameScreen";
      itemHud.hidden = screenId !== "gameScreen" || state.activeItems.length === 0;
      pauseOverlay.hidden = true;
      if (screenId === "gameScreen") {
        menuMusic.pause();
      } else {
        playMenuMusic();
      }
      state.screen = screenId === "gameScreen" ? "game" : screenId;
      if (screenId !== "gameScreen" && screenId !== "authScreen") {
        refreshCloudSave();
      }
      if (screenId === "skinsScreen") {
        skinComboMotion.lastTime = 0;
        skinComboMotion.nextShotAt = 0;
        skinComboMotion.trail = [];
        renderSkinShop();
        startSkinPreviewAnimation();
      } else if (screenId === "challengesScreen") {
        if (previousScreen !== "challengesScreen") {
          state.freshlyClaimedChallenges.clear();
        }
        renderChallenges();
        stopSkinPreviewAnimation();
        closeColorDialog();
      } else if (screenId === "leaderboardScreen") {
        renderLeaderboard();
        stopSkinPreviewAnimation();
        closeColorDialog();
      } else if (screenId === "specialModesScreen") {
        renderModeList();
        stopSkinPreviewAnimation();
        closeColorDialog();
      } else {
        stopSkinPreviewAnimation();
        closeColorDialog();
      }
      if (screenId !== "skinsScreen") {
        previewSkinOverrides.color = null;
        previewSkinOverrides.shape = null;
        previewSkinOverrides.trail = null;
      }
      if (screenId !== "mainScreen") {
        closeSettings();
      }
      if (screenId !== "specialModesScreen") {
        closeModeInfo();
      }
      if (screenId !== "gameScreen") {
        state.running = false;
        state.paused = false;
        state.deathSequence = false;
        state.lasers = [];
        state.mines = [];
        state.starPairs = [];
        state.itemPickups = [];
        state.activeItems = [];
        updateItemHud();
      }
    }

    function startMode(modeId = "classic") {
      const mode = gameModes[modeId] || gameModes.classic;
      const shouldStartLoop = !state.loopActive;
      state.mode = mode.id;
      state.running = true;
      state.paused = false;
      state.screen = "game";
      state.lastTime = performance.now();
      state.resumeSlowMo = 0;
      state.deathSequence = false;
      state.deathTimer = 0;
      state.spawnTimer = 0.8;
      state.spawnDelay = 1.75;
      state.normalBoostTimer = 4.8;
      state.rainbowPlanetPending = ["classic", "items", "flow"].includes(mode.id) && !state.unlockedTrails.has("rainbow") && Math.random() < 0.01;
      state.rainbowPlanetSpawned = false;
      state.collectibleTimer = 5.8;
      state.itemTimer = mode.id === "items" ? 4.8 : 8.5;
      state.meteorTimer = 3.6;
      state.meteorDelay = 3.6;
      state.laserTimer = mode.id === "chaos" ? 0 : 8;
      state.mineTimer = mode.id === "chaos" ? 0 : 12;
      state.starPairTimer = mode.id === "chaos" ? 0 : CHAOS_STAR_PAIR_START;
      state.elapsed = 0;
      state.score = 0;
      state.huntHits = 0;
      state.huntLastTargetId = null;
      state.huntTargetId = pickNextHuntColorId();
      state.runStars = 0;
      state.solarRunEligible = mode.id === "classic";
      state.magentaRunEligible = mode.id === "classic";
      state.itemsNoItemRunEligible = mode.id === "items";
      state.strengthMeteorKills = 0;
      state.stillRunEligible = mode.id === "chaos";
      state.combo = 1;
      state.comboTimer = 0;
      state.comboTimerMax = comboDuration(1);
      state.bestCombo = 1;
      state.lives = mode.lives;
      state.invulnerableTimer = 0;
      state.shotCooldown = 0;
      state.shotCooldownMax = mode.shotCooldownMax;
      state.shake = 0;
      state.enemies = [];
      state.lasers = [];
      state.mines = [];
      state.starPairs = [];
      state.collectibles = [];
      state.itemPickups = [];
      state.activeItems = [];
      state.meteorWarnings = [];
      state.sparks = [];
      state.waves = [];
      state.player.x = state.width * 0.5;
      state.player.y = state.height * 0.58;
      state.stillStartX = state.player.x;
      state.stillStartY = state.player.y;
      state.player.vx = 0;
      state.player.vy = 0;
      state.player.trail = [];
      screens.forEach((screen) => {
        screen.hidden = true;
      });
      playBackgroundMusic(true);
      gameHud.hidden = false;
      pauseButton.hidden = false;
      updateItemHud();
      pauseOverlay.hidden = true;
      updateHud();
      if (shouldStartLoop) {
        state.loopActive = true;
        requestAnimationFrame(loop);
      }
    }

    async function startModeFresh(modeId = "classic") {
      if (startRefreshPending || state.running) return;
      startRefreshPending = true;
      if (cloudEnabled && authToken) {
        const fresh = await refreshCloudSave({ force: true });
        if (!fresh) {
          startRefreshPending = false;
          return;
        }
      }
      startRefreshPending = false;
      startMode(modeId);
    }

    function resetGame() {
      startModeFresh("classic");
    }

    function restartCurrentMode() {
      startModeFresh(state.mode || "classic");
    }

    function updateHud() {
      const mode = gameModes[state.mode] || gameModes.classic;
      gameHud.classList.toggle("chaos-mode", state.mode === "chaos");
      gameHud.classList.toggle("color-hunt-mode", state.mode === "colorHunt");
      const scoreStat = scoreEl.closest(".hud-stat");
      const scoreLabel = scoreStat.querySelector(".hud-label");
      scoreLabel.textContent = mode.scoreLabel;
      scoreEl.textContent = state.mode === "chaos" ? formatTime(state.elapsed) : state.mode === "colorHunt" ? String(state.huntHits) : String(state.score);
      runStarsEl.textContent = `★ ${state.runStars}`;
      runStarsEl.hidden = !mode.collectibles;
      const huntColor = currentHuntColor();
      huntTargetStat.hidden = state.mode !== "colorHunt";
      huntTargetEl.textContent = huntColor.name;
      huntTargetEl.style.setProperty("--hunt-color", huntColor.color);
      huntTargetEl.style.setProperty("--hunt-glow", `hsla(${huntColor.hue}, 100%, 64%, 0.82)`);
      totalStarsEl.textContent = String(state.totalStars);
      skinStarsEl.textContent = String(state.totalStars);
      comboEl.textContent = `x${state.combo}`;
      comboEl.classList.toggle("hot", state.combo > 1);
      comboProgressFill.style.width = state.combo > 1 ? `${clamp(state.comboTimer / state.comboTimerMax, 0, 1) * 100}%` : "0%";
      comboEl.closest(".hud-stat").hidden = !mode.combo;
      livesEl.innerHTML = Array.from({ length: mode.lives }, (_, index) => (
        `<span class="heart${index >= state.lives ? " empty" : ""}">♥</span>`
      )).join("");
      updateChallengeAlert();
    }

    function showComboBadge(text, bad = false) {
      if (state.screen === "game" && state.mode === "chaos" && !bad) return;
      comboBadge.textContent = text;
      comboBadge.classList.toggle("bad", bad);
      comboBadge.classList.remove("show");
      void comboBadge.offsetWidth;
      comboBadge.classList.add("show");
    }

    function countEnemies(type) {
      return state.enemies.filter((enemy) => enemy.type === type).length;
    }

    function countPlanets() {
      return state.enemies.filter((enemy) => enemy.type === "normal" || enemy.type === "armored" || enemy.type === "blackhole" || enemy.type === "rainbow").length;
    }

    function currentHuntColor() {
      return huntColors.find((color) => color.id === state.huntTargetId) || huntColors[0];
    }

    function pickNextHuntColorId() {
      const options = huntColors.filter((color) => color.id !== state.huntLastTargetId);
      const pick = options[Math.floor(rand(0, options.length))] || huntColors[0];
      state.huntLastTargetId = pick.id;
      return pick.id;
    }

    function advanceHuntTarget() {
      state.huntTargetId = pickNextHuntColorId();
      state.spawnTimer = Math.min(state.spawnTimer, 0.08);
      updateHud();
    }

    function hasHuntTargetOnField() {
      return state.enemies.some((enemy) => enemy.type === "hunt" && enemy.colorId === state.huntTargetId);
    }

    function spawnEnemy(forcedType = null) {
      const edge = Math.floor(rand(0, 4));
      const typeRoll = Math.random();
      const pressure = scorePressure();
      const spawnRainbow = state.rainbowPlanetPending && !state.rainbowPlanetSpawned && !forcedType;
      const blackHoleChance = 0.075 + pressure * 0.095;
      const armoredChance = 0.145 + pressure * 0.025;
      const type = spawnRainbow ? "rainbow" : forcedType || (typeRoll < blackHoleChance ? "blackhole" : typeRoll < blackHoleChance + armoredChance ? "armored" : "normal");
      const r = type === "blackhole" ? rand(19, 32) : type === "armored" ? rand(22, 38) : rand(16, 33);
      let x;
      let y;
      if (edge === 0) {
        x = rand(r, state.width - r);
        y = -r;
      } else if (edge === 1) {
        x = state.width + r;
        y = rand(r, state.height - r);
      } else if (edge === 2) {
        x = rand(r, state.width - r);
        y = state.height + r;
      } else {
        x = -r;
        y = rand(r, state.height - r);
      }

      const targetX = rand(state.width * 0.2, state.width * 0.8);
      const targetY = rand(state.height * 0.22, state.height * 0.86);
      const angle = Math.atan2(targetY - y, targetX - x);
      const baseSpeed = type === "blackhole" ? rand(44, 88) : type === "armored" ? rand(36, 78) : rand(58, 116);
      const speed = baseSpeed + Math.min(90, state.score * 0.012);
      const huePick = Math.random();
      const hue = huePick < 0.34 ? 192 : huePick < 0.68 ? 322 : 48;
      const health = type === "armored" ? 2 : 1;
      if (spawnRainbow) {
        state.rainbowPlanetSpawned = true;
        state.rainbowPlanetPending = false;
      }

      state.enemies.push({
        type,
        x,
        y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        r,
        hue: type === "blackhole" ? 262 : type === "rainbow" ? 188 : hue,
        spin: rand(-2.6, 2.6),
        angle: rand(0, TAU),
        health,
        maxHealth: health,
        hitFlash: 0,
        hitCooldown: 0
      });
    }

    function spawnColorHuntPlanet(forcedColorId = null) {
      const edge = Math.floor(rand(0, 4));
      const r = rand(17, 31);
      let x;
      let y;
      if (edge === 0) {
        x = rand(r, state.width - r);
        y = -r;
      } else if (edge === 1) {
        x = state.width + r;
        y = rand(r, state.height - r);
      } else if (edge === 2) {
        x = rand(r, state.width - r);
        y = state.height + r;
      } else {
        x = -r;
        y = rand(r, state.height - r);
      }

      const targetX = rand(state.width * 0.16, state.width * 0.84);
      const targetY = rand(state.height * 0.18, state.height * 0.88);
      const angle = Math.atan2(targetY - y, targetX - x);
      const speed = rand(54, 108) + Math.min(64, state.huntHits * 2.2);
      const color = huntColors.find((item) => item.id === forcedColorId) || huntColors[Math.floor(rand(0, huntColors.length))] || huntColors[0];
      state.enemies.push({
        type: "hunt",
        x,
        y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        r,
        hue: color.hue,
        colorId: color.id,
        spin: rand(-2.8, 2.8),
        angle: rand(0, TAU),
        health: 1,
        maxHealth: 1,
        hitFlash: 0,
        hitCooldown: 0
      });
    }

    function createMeteorData() {
      const edge = Math.floor(rand(0, 4));
      const sizeRoll = Math.random();
      const r = sizeRoll < 0.18 ? rand(27, 38) : sizeRoll < 0.58 ? rand(19, 28) : rand(14, 19);
      let x;
      let y;
      if (edge === 0) {
        x = rand(r, state.width - r);
        y = -r;
      } else if (edge === 1) {
        x = state.width + r;
        y = rand(r, state.height - r);
      } else if (edge === 2) {
        x = rand(r, state.width - r);
        y = state.height + r;
      } else {
        x = -r;
        y = rand(r, state.height - r);
      }

      const targetX = state.player.x + rand(-state.width * 0.24, state.width * 0.24);
      const targetY = state.player.y + rand(-state.height * 0.24, state.height * 0.24);
      const angle = Math.atan2(targetY - y, targetX - x);
      const speed = rand(116, 196) + Math.min(120, state.elapsed * 2.4) - r * 1.15;
      const pointCount = Math.floor(rand(6, 10));

      return {
        type: "meteor",
        x,
        y,
        edge,
        warningX: clamp(x, 18, state.width - 18),
        warningY: clamp(y, 18, state.height - 18),
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        r,
        hue: 18,
        spin: rand(-6, 6),
        angle: rand(0, TAU),
        health: 1,
        maxHealth: 1,
        hitFlash: 0,
        hitCooldown: 0,
        vertices: Array.from({ length: pointCount }, () => rand(0.72, 1.08))
      };
    }

    function queueMeteorWarning(meteor = createMeteorData(), warningTime = 1.18) {
      state.meteorWarnings.push({
        meteor,
        life: warningTime,
        maxLife: warningTime
      });
    }

    function spawnMeteor(meteor) {
      state.enemies.push(meteor);
    }

    function spawnCollectibleStar() {
      const margin = 38;
      state.collectibles.push({
        type: "star",
        x: rand(margin, state.width - margin),
        y: rand(state.height * 0.16, state.height * 0.86),
        r: 11,
        life: 8.5,
        maxLife: 8.5,
        spin: rand(-2.8, 2.8),
        angle: rand(0, TAU)
      });
    }

    function spawnItemPickup() {
      const pool = Object.values(itemTypes);
      const item = pool[Math.floor(rand(0, pool.length))] || itemTypes.noCooldown;
      const margin = 42;
      state.itemPickups.push({
        type: item.id,
        x: rand(margin, state.width - margin),
        y: rand(state.height * 0.18, state.height * 0.82),
        r: 14,
        life: 9.5,
        maxLife: 9.5,
        angle: rand(0, TAU),
        spin: rand(-2.4, 2.4)
      });
    }

    function addSparks(x, y, hue, amount, power) {
      for (let i = 0; i < amount; i++) {
        const angle = rand(0, TAU);
        const speed = rand(power * 0.35, power);
        state.sparks.push({
          x,
          y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          r: rand(1.4, 4.5),
          hue,
          life: rand(0.35, 0.82),
          maxLife: 0
        });
        state.sparks[state.sparks.length - 1].maxLife = state.sparks[state.sparks.length - 1].life;
      }
    }

    function addWave(x, y, hue, radius) {
      state.waves.push({ x, y, hue, radius, life: 0.45, maxLife: 0.45 });
    }

    function collectStar(star, index) {
      playSound("star");
      state.runStars += 1;
      state.totalStars += 1;
      saveStars();
      if (state.mode === "classic" && state.runStars > state.bestRunStars) {
        state.bestRunStars = state.runStars;
        saveBestRunStars();
      }
      if (state.mode === "classic" && state.runStars >= 10) {
        completeChallenge("nova-10-stars");
      }
      state.collectibles.splice(index, 1);
      state.shake = Math.min(10, state.shake + 3);
      addSparks(star.x, star.y, 48, 24, 220);
      addWave(star.x, star.y, 48, 24);
      showComboBadge("★ +1");
      updateHud();
    }

    function collectItem(item, index) {
      playSound("item");
      const type = itemTypes[item.type];
      if (!type) return;
      if (state.mode === "items") {
        state.itemsNoItemRunEligible = false;
      }
      if (state.mode === "items" && item.type === "strength") {
        state.strengthMeteorKills = 0;
      }
      const active = state.activeItems.find((entry) => entry.type === item.type);
      if (active) {
        active.remaining = type.duration;
        active.duration = type.duration;
      } else {
        state.activeItems.push({
          type: item.type,
          remaining: type.duration,
          duration: type.duration
        });
      }
      state.itemPickups.splice(index, 1);
      state.shotCooldown = 0;
      state.shake = Math.min(12, state.shake + 4);
      addSparks(item.x, item.y, 188, 28, 240);
      addWave(item.x, item.y, 188, 28);
      showComboBadge(type.name);
      updateItemHud();
    }

    function hasActiveItem(type) {
      return state.activeItems.some((item) => item.type === type && item.remaining > 0);
    }

    function consumeActiveItem(type) {
      const index = state.activeItems.findIndex((item) => item.type === type && item.remaining > 0);
      if (index < 0) return false;
      state.activeItems.splice(index, 1);
      updateItemHud();
      return true;
    }

    function isSlowMoHoldActive(time) {
      return (
        state.mode === "items" &&
        hasActiveItem("slowMo") &&
        pointer.down &&
        !state.paused &&
        !state.deathSequence &&
        time - pointer.downAt > 170
      );
    }

    function updateItemHud() {
      if (state.screen !== "game" || state.activeItems.length === 0) {
        itemHud.hidden = true;
        itemHud.innerHTML = "";
        return;
      }
      itemHud.hidden = false;
      itemHud.innerHTML = state.activeItems.map((active) => {
        const type = itemTypes[active.type];
        const progress = clamp(active.remaining / active.duration, 0, 1) * 100;
        return `
          <div class="item-effect">
            <span class="item-icon">${type.icon}</span>
            <span class="item-meter">
              <span>${type.name}</span>
              <span class="item-bar"><span class="item-bar-fill" style="width: ${progress}%; background: linear-gradient(90deg, hsl(${type.hue} 100% 64%), hsl(${(type.hue + 52) % 360} 100% 68%));"></span></span>
            </span>
          </div>
        `;
      }).join("");
    }

    function startDeathSequence() {
      playSound("gameover");
      const player = state.player;
      state.deathSequence = true;
      state.deathTimer = state.deathTimerMax;
      state.paused = false;
      state.shake = Math.min(34, state.shake + 24);
      player.vx = 0;
      player.vy = 0;
      player.trail = [];
      addSparks(player.x, player.y, 188, 96, 470);
      addSparks(player.x, player.y, 322, 32, 340);
      addWave(player.x, player.y, 188, 38);
      showComboBadge("Critical Hit", true);
    }

    function formatScore(value) {
      return new Intl.NumberFormat("de-DE").format(value);
    }

    function formatTime(seconds) {
      const totalTenths = Math.max(0, Math.floor(seconds * 10));
      const minutes = Math.floor(totalTenths / 600);
      const secs = Math.floor((totalTenths % 600) / 10);
      const tenths = totalTenths % 10;
      return `${minutes}:${String(secs).padStart(2, "0")}.${tenths}`;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function leaderboardModes() {
      return [
        {
          id: "classic",
          name: "Classic",
          score: state.classicBestScore,
          format: formatScore
        },
        {
          id: "items",
          name: "Items",
          score: state.itemsBest,
          format: formatScore
        },
        {
          id: "flow",
          name: "Flow",
          score: state.flowBest,
          format: formatScore
        },
        {
          id: "colorHunt",
          name: "Color Hunt",
          score: state.colorHuntBest,
          format: (value) => `${formatScore(value)} Treffer`
        },
        {
          id: "chaos",
          name: "Chaos",
          score: state.chaosBest,
          format: formatTime
        }
      ];
    }

    async function renderLeaderboard() {
      const modes = leaderboardModes();
      const mode = modes[state.leaderboardIndex] || modes[0];
      const localName = escapeHtml(playerName);
      leaderboardModeEl.textContent = mode.name;
      if (!cloudEnabled || !authToken) {
        leaderboardList.innerHTML = `
          <div class="leaderboard-row current-player">
            <div class="leaderboard-rank">#1</div>
            <div class="leaderboard-name">${localName}</div>
            <div class="leaderboard-score">${mode.format(mode.score)}</div>
          </div>
        `;
        return;
      }
      leaderboardList.innerHTML = `<div class="leaderboard-row"><div class="leaderboard-name">Lade Bestenliste...</div></div>`;
      try {
        const payload = await apiRequest(`/api/leaderboard/${mode.id}`);
        const rows = payload.rows || [];
        leaderboardList.innerHTML = rows.length ? rows.map((row, index) => {
          const rank = Number(row.rank || index + 1);
          const isCurrent = row.isCurrent || row.username === playerName;
          return `
            <div class="leaderboard-row${isCurrent ? " current-player" : ""}">
              <div class="leaderboard-rank">#${rank}</div>
              <div class="leaderboard-name">${escapeHtml(row.username)}</div>
              <div class="leaderboard-score">${mode.format(row.score)}</div>
            </div>
          `;
        }).join("") : `<div class="leaderboard-row"><div class="leaderboard-name">Noch keine Scores</div></div>`;
      } catch {
        leaderboardList.innerHTML = `
          <div class="leaderboard-row current-player">
            <div class="leaderboard-rank">#1</div>
            <div class="leaderboard-name">${localName}</div>
            <div class="leaderboard-score">${mode.format(mode.score)}</div>
          </div>
        `;
      }
    }

    function changeLeaderboardMode(direction) {
      const modes = leaderboardModes();
      state.leaderboardIndex = (state.leaderboardIndex + direction + modes.length) % modes.length;
      renderLeaderboard();
    }

        </div>

    function challengeValue(challenge) {
      if (challenge.type === "chaos-time") return state.chaosBest;
      if (challenge.type === "chaos-still") return state.stillBest;
      if (challenge.type === "solar-score") return state.solarBestScore;
      if (challenge.type === "magenta-score") return state.magentaBestScore;
      if (challenge.type === "items-no-item-score") return state.itemsNoItemBestScore;
      if (challenge.type === "strength-meteors") return state.strengthMeteorBest;
      if (challenge.type === "color-hunt-hits") return state.colorHuntBest;
      if (challenge.type === "run-stars") return state.bestRunStars;
      if (challenge.type === "planet-destroys") return state.planetDestroyCount;
      return state.classicBestCombo;
    }

    function challengeTarget(challenge) {
      if (challenge.type === "planet-destroys") return challenge.targetPlanets;
      if (challenge.type === "chaos-still") return challenge.targetTime;
      if (challenge.type === "run-stars") return challenge.targetStars;
      if (challenge.type === "strength-meteors") return challenge.targetMeteors;
      if (challenge.type === "color-hunt-hits") return challenge.targetHits;
      if (challenge.type === "solar-score" || challenge.type === "magenta-score" || challenge.type === "items-no-item-score") return challenge.targetScore;
      return challenge.type === "chaos-time" ? challenge.targetTime : challenge.targetCombo;
    }

    function isChallengeReady(challenge) {
      if (challenge.type === "solar-score" || challenge.type === "magenta-score") {
        return state.completedChallenges.has(challenge.id) || challengeValue(challenge) >= challengeTarget(challenge);
      }
      if (challenge.type === "run-stars") {
        return state.completedChallenges.has(challenge.id) || challengeValue(challenge) >= challengeTarget(challenge);
      }
      if (challenge.type === "chaos-still") {
        return state.completedChallenges.has(challenge.id) || challengeValue(challenge) >= challengeTarget(challenge);
      }
      if (challenge.type === "color-hunt-hits") {
        return state.completedChallenges.has(challenge.id) || challengeValue(challenge) >= challengeTarget(challenge);
      }
      if (challenge.type === "items-no-item-score") {
        return state.completedChallenges.has(challenge.id) || challengeValue(challenge) >= challengeTarget(challenge);
      }
      if (challenge.type === "strength-meteors") {
        return state.completedChallenges.has(challenge.id) || challengeValue(challenge) >= challengeTarget(challenge);
      }
      return challengeValue(challenge) >= challengeTarget(challenge);
    }

    function challengeProgressText(challenge, claimed) {
      if (claimed) return "Belohnung abgeholt";
      if (challenge.type === "chaos-time") {
        const progress = Math.min(challengeValue(challenge), challenge.targetTime);
        return `Fortschritt ${formatTime(progress)} / ${formatTime(challenge.targetTime)}`;
      }
      if (challenge.type === "solar-score" || challenge.type === "magenta-score" || challenge.type === "items-no-item-score") {
        const progress = Math.min(challengeValue(challenge), challenge.targetScore);
        return `Fortschritt ${formatScore(progress)} / ${formatScore(challenge.targetScore)}`;
      }
      if (challenge.type === "run-stars") {
        const progress = Math.min(challengeValue(challenge), challenge.targetStars);
        return `Fortschritt ${progress} / ${challenge.targetStars}`;
      }
      if (challenge.type === "planet-destroys") {
        const progress = Math.min(challengeValue(challenge), challenge.targetPlanets);
        return `Fortschritt ${formatScore(progress)} / ${formatScore(challenge.targetPlanets)}`;
      }
      if (challenge.type === "strength-meteors") {
        const progress = Math.min(challengeValue(challenge), challenge.targetMeteors);
        return `Fortschritt ${progress} / ${challenge.targetMeteors} Kometen`;
      }
      if (challenge.type === "color-hunt-hits") {
        const progress = Math.min(challengeValue(challenge), challenge.targetHits);
        return `Fortschritt ${formatScore(progress)} / ${formatScore(challenge.targetHits)} Treffer`;
      }
      if (challenge.type === "chaos-still") {
        const progress = Math.min(challengeValue(challenge), challenge.targetTime);
        return `Fortschritt ${formatTime(progress)} / ${formatTime(challenge.targetTime)}`;
      }
      const progress = clamp(challengeValue(challenge), 1, challenge.targetCombo);
      return `Fortschritt x${progress} / x${challenge.targetCombo}`;
    }

    function challengeRewardMarkup(challenge) {
      if (challenge.rewardColor) {
        const color = playerColors.find((item) => item.id === challenge.rewardColor) || playerColors[0];
        return `<div class="challenge-color-preview${color.id === "chroma" ? " special-color" : ""}" style="--swatch: ${color.glow}" aria-label="${color.name}"></div><div class="challenge-stars">${color.name}</div>`;
      }
      if (challenge.rewardShape) {
        const shape = playerShapes.find((item) => item.id === challenge.rewardShape) || playerShapes[0];
        return `<canvas class="challenge-shape-preview" data-challenge-shape-preview="${shape.id}" width="96" height="96" aria-label="${shape.name}"></canvas><div class="challenge-stars">${shape.name}</div>`;
      }
      if (challenge.rewardTrail) {
        const trail = playerTrails.find((item) => item.id === challenge.rewardTrail) || playerTrails[0];
        return `<canvas class="trail-preview" data-challenge-trail-preview="${trail.id}" width="124" height="88" aria-label="${trail.name}"></canvas><div class="challenge-stars">${trail.name}</div>`;
      }
      return `<div class="challenge-stars">★ ${challenge.rewardStars}</div>`;
    }

    function renderChallengeRewardPreviews() {
      const previewColor = playerColors[0];
      challengeList.querySelectorAll("[data-challenge-shape-preview]").forEach((preview) => {
        const previewCtx = preview.getContext("2d");
        const shapeId = preview.dataset.challengeShapePreview;
        const time = performance.now();
        previewCtx.clearRect(0, 0, preview.width, preview.height);
        previewCtx.save();
        previewCtx.translate(preview.width / 2, preview.height / 2);
        previewCtx.shadowBlur = 10;
        previewCtx.shadowColor = previewColor.glow;
        previewCtx.fillStyle = previewColor.core;
        drawPlayerShape(shapeId, 27, time, previewCtx);
        previewCtx.fill();
        previewCtx.lineWidth = 3;
        previewCtx.strokeStyle = previewColor.glow;
        previewCtx.stroke();
        drawPlayerShapeDetails(shapeId, 27, time, previewColor, previewCtx);
        previewCtx.restore();
      });
      challengeList.querySelectorAll("[data-challenge-trail-preview]").forEach((preview) => {
        const previewCtx = preview.getContext("2d");
        const trailId = preview.dataset.challengeTrailPreview;
        const time = performance.now();
        previewCtx.clearRect(0, 0, preview.width, preview.height);
        previewCtx.save();
        for (let i = 8; i >= 0; i--) {
          const x = 18 + i * 10;
          const y = preview.height / 2 + Math.sin(i * 0.8 + time / 260) * 8;
          const alpha = (1 - i / 10) * 0.72;
          drawTrailStyle(previewCtx, trailId, x, y, 13 - i * 0.65, alpha, i, time);
        }
        previewCtx.restore();
      });
    }

    function visibleChallenges() {
      const chainOrder = [];
      for (const challenge of challenges) {
        if (!chainOrder.includes(challenge.chain)) {
          chainOrder.push(challenge.chain);
        }
      }

      return chainOrder.map((chain) => {
        const chainChallenges = challenges.filter((challenge) => challenge.chain === chain);
        const nextChallenge = chainChallenges.find((challenge) => !state.claimedChallenges.has(challenge.id));
        return nextChallenge || chainChallenges[chainChallenges.length - 1];
      });
    }

    function hasClaimableChallenge() {
      return visibleChallenges().some((challenge) => (
        !state.claimedChallenges.has(challenge.id) && isChallengeReady(challenge)
      ));
    }

    function isProgressiveChallenge(challenge) {
      return challenges.filter((item) => item.chain === challenge.chain).length > 1;
    }

    function updateChallengeAlert() {
      challengeAlert.hidden = !hasClaimableChallenge();
    }

    function challengePanelMarkup(challenge, highlight = false) {
      const claimed = state.claimedChallenges.has(challenge.id);
      const ready = isChallengeReady(challenge);
      const actionLabel = claimed ? "✓" : ready ? "★" : "–";
      return `
        <div class="challenge-panel${ready && !claimed ? " ready" : ""}${claimed ? " claimed" : ""}${highlight ? " claim-pop" : ""}" data-challenge-panel="${challenge.id}">
          <div>
            <div class="challenge-name">${challenge.name}</div>
            <div class="challenge-copy">${challenge.description}</div>
            <div class="challenge-progress">${challengeProgressText(challenge, claimed)}</div>
          </div>
          <div class="challenge-reward">
            ${challengeRewardMarkup(challenge)}
            <button class="challenge-claim${claimed || !ready ? " secondary-button" : ""}" data-claim-challenge="${challenge.id}" type="button" ${claimed || !ready ? "disabled" : ""} aria-label="${challenge.name} Belohnung abholen">${actionLabel}</button>
          </div>
        </div>
      `;
    }

    function challengeCategory(challenge) {
      if (challenge.rewardColor) return "Farben";
      if (challenge.rewardShape) return "Formen";
      if (challenge.rewardTrail) return "Trails";
      if (challenge.chain === "combo") return "Combo";
      if (challenge.chain === "chaos-time") return "Zeit";
      return "Sammlung";
    }

    function groupedChallengeMarkup(challengeItems, highlightChallengeId = null, includeHeading = true) {
      const categoryOrder = ["Combo", "Zeit", "Farben", "Formen", "Trails", "Sammlung"];
      return categoryOrder.map((category) => {
        const group = challengeItems.filter((challenge) => challengeCategory(challenge) === category);
        if (!group.length) return "";
        const heading = includeHeading ? `<div class="challenge-section-heading">${category}</div>` : "";
        return `
          <div class="challenge-group">
            ${heading}
            ${group.map((challenge) => challengePanelMarkup(challenge, challenge.id === highlightChallengeId)).join("")}
          </div>
        `;
      }).join("");
    }

    function renderChallenges(highlightChallengeId = null) {
      const visible = visibleChallenges();
      const freshClaimed = challenges.filter((challenge) => state.freshlyClaimedChallenges.has(challenge.id));
      const activeChallenges = [
        ...freshClaimed,
        ...visible.filter((challenge) => !state.claimedChallenges.has(challenge.id) && !state.freshlyClaimedChallenges.has(challenge.id))
      ];
      const claimedChallenges = challenges.filter((challenge) => (
        state.claimedChallenges.has(challenge.id) && !state.freshlyClaimedChallenges.has(challenge.id)
      ));
      activeChallenges.sort((a, b) => {
        const aReady = isChallengeReady(a);
        const bReady = isChallengeReady(b);
        if (aReady !== bReady) return aReady ? -1 : 1;
        return visible.indexOf(a) - visible.indexOf(b);
      });
      const activeMarkup = groupedChallengeMarkup(activeChallenges, highlightChallengeId);
      const claimedMarkup = claimedChallenges.length
        ? `<div class="challenge-group"><div class="challenge-section-heading">Erledigt</div>${claimedChallenges.map((challenge) => challengePanelMarkup(challenge, challenge.id === highlightChallengeId)).join("")}</div>`
        : "";

      challengeList.innerHTML = `${activeMarkup}${claimedMarkup}`;
      renderChallengeRewardPreviews();
      updateChallengeAlert();
    }

    function challengeRewardText(challenge) {
      if (challenge.rewardStars) return `★ +${challenge.rewardStars}`;
      if (challenge.rewardColor) {
        const color = playerColors.find((item) => item.id === challenge.rewardColor);
        return `${color?.name || "Farbe"} freigeschaltet`;
      }
      if (challenge.rewardShape) {
        const shape = playerShapes.find((item) => item.id === challenge.rewardShape);
        return `${shape?.name || "Form"} freigeschaltet`;
      }
      if (challenge.rewardTrail) {
        const trail = playerTrails.find((item) => item.id === challenge.rewardTrail);
        return `${trail?.name || "Trail"} freigeschaltet`;
      }
      return "Belohnung erhalten";
    }

    function claimChallenge(challengeId) {
      const challenge = challenges.find((item) => item.id === challengeId);
      if (!challenge || state.claimedChallenges.has(challenge.id)) return;
      if (!isChallengeReady(challenge)) return;
      playSound("unlock");
      state.claimedChallenges.add(challenge.id);
      if (!isProgressiveChallenge(challenge)) {
        state.freshlyClaimedChallenges.add(challenge.id);
      }
      if (challenge.rewardColor) {
        state.unlockedColors.add(challenge.rewardColor);
        state.selectedColor = challenge.rewardColor;
        saveColorState();
      } else if (challenge.rewardShape) {
        state.unlockedShapes.add(challenge.rewardShape);
        state.selectedShape = challenge.rewardShape;
        saveShapeState();
      } else if (challenge.rewardTrail) {
        state.unlockedTrails.add(challenge.rewardTrail);
        state.selectedTrail = challenge.rewardTrail;
        saveTrailState();
      } else {
        state.totalStars += challenge.rewardStars;
        saveStars();
      }
      saveChallengeState();
      updateHud();
      showComboBadge(challengeRewardText(challenge));
      renderChallenges(challenge.id);
      renderSkinShop();
    }

    function rememberClassicCombo() {
      if (state.mode !== "classic" || state.bestCombo <= state.classicBestCombo) return;
      state.classicBestCombo = state.bestCombo;
      saveClassicBestCombo();
    }

    function isColoredPlanet(enemy, hue) {
      return (enemy.type === "normal" || enemy.type === "armored") && enemy.hue === hue;
    }

    function completeChallenge(challengeId) {
      if (state.completedChallenges.has(challengeId) || state.claimedChallenges.has(challengeId)) return;
      state.completedChallenges.add(challengeId);
      saveChallengeState();
      updateChallengeAlert();
      playSound("combo");
      const challenge = challenges.find((item) => item.id === challengeId);
      const color = challenge?.rewardColor ? playerColors.find((item) => item.id === challenge.rewardColor) : null;
      showComboBadge(`${color?.name || "Belohnung"} bereit`);
    }

    function updateColorRunChallenges(enemy) {
      if (state.mode !== "classic") return;
      if (enemy.type !== "normal" && enemy.type !== "armored") return;

      if (state.solarRunEligible) {
        if (!isColoredPlanet(enemy, 48)) {
          state.solarRunEligible = false;
        } else {
          if (state.score > state.solarBestScore) {
            state.solarBestScore = state.score;
            saveSolarBestScore();
          }
          if (state.score >= 10000) {
            completeChallenge("solar-yellow-10000");
          }
        }
      }

      if (state.magentaRunEligible) {
        if (!isColoredPlanet(enemy, 322)) {
          state.magentaRunEligible = false;
        } else {
          if (state.score > state.magentaBestScore) {
            state.magentaBestScore = state.score;
            saveMagentaBestScore();
          }
          if (state.score >= 5000) {
            completeChallenge("magenta-5000");
          }
        }
      }
    }

    function rememberPlanetDestroy(enemy) {
      if (state.mode !== "classic" && state.mode !== "items" && state.mode !== "flow") return;
      if (enemy.type !== "normal" && enemy.type !== "armored") return;
      state.planetDestroyCount += 1;
      savePlanetDestroyCount();
    }

    function updateItemsNoItemChallenge() {
      if (state.mode !== "items" || !state.itemsNoItemRunEligible) return;
      if (state.score > state.itemsNoItemBestScore) {
        state.itemsNoItemBestScore = state.score;
        saveItemsNoItemBestScore();
      }
      if (state.score >= 20000) {
        completeChallenge("pulse-items-no-item-20000");
      }
    }

    function unlockRainbowTrailFromPlanet() {
      if (state.unlockedTrails.has("rainbow")) return;
      playSound("unlock");
      state.unlockedTrails.add("rainbow");
      state.selectedTrail = "rainbow";
      localStorage.setItem("neonSlingshotRainbowUnlocked", "yes");
      saveTrailState();
      showComboBadge("Rainbow freigeschaltet");
      updateHud();
    }

    function rememberStrengthMeteorKill() {
      if (state.mode !== "items" || !hasActiveItem("strength")) return;
      state.strengthMeteorKills += 1;
      if (state.strengthMeteorKills > state.strengthMeteorBest) {
        state.strengthMeteorBest = state.strengthMeteorKills;
        saveStrengthMeteorBest();
      }
      if (state.strengthMeteorKills >= 5) {
        completeChallenge("fire-strength-5-meteors");
      }
    }

    function destroyHuntPlanet(enemy, index) {
      playSound("collect");
      state.huntHits += 1;
      state.score += 140 + state.huntHits * 8;
      state.shotCooldown = 0;
      state.shake = Math.min(14, state.shake + 5);
      addSparks(enemy.x, enemy.y, enemy.hue, Math.floor(enemy.r * 1.35), 250);
      addWave(enemy.x, enemy.y, enemy.hue, enemy.r + 10);
      state.enemies.splice(index, 1);
      showComboBadge(`Treffer ${state.huntHits}`);
      advanceHuntTarget();
      updateHud();
    }

    function destroyEnemy(enemy, index, bonus = 0) {
      playSound("collect");
      const gained = Math.round((100 + bonus + enemy.r * 4) * state.combo);
      state.score += gained;
      if (enemy.type === "rainbow") {
        unlockRainbowTrailFromPlanet();
      }
      updateColorRunChallenges(enemy);
      rememberPlanetDestroy(enemy);
      updateItemsNoItemChallenge();
      state.combo = clamp(state.combo + 1, 1, 20);
      state.bestCombo = Math.max(state.bestCombo, state.combo);
      rememberClassicCombo();
      refreshComboTimer();
      state.shake = Math.min(16, state.shake + 5 + state.combo * 0.45);
      state.shotCooldown = 0;
      addSparks(enemy.x, enemy.y, enemy.hue, Math.floor(enemy.r * 1.4), 260);
      addWave(enemy.x, enemy.y, enemy.hue, enemy.r + 8);
      state.enemies.splice(index, 1);
      if (state.combo > 2) {
        showComboBadge(`Combo x${state.combo} +${gained}`);
      }
      updateHud();
    }

    function loseLife(enemy, index) {
      playSound("damage");
      if (state.invulnerableTimer > 0) return;
      if (state.mode === "items" && consumeActiveItem("shield")) {
        state.invulnerableTimer = 0.75;
        state.shake = Math.min(20, state.shake + 10);
        addSparks(enemy.x, enemy.y, 188, 32, 260);
        addWave(enemy.x, enemy.y, 188, enemy.r + 22);
        state.enemies.splice(index, 1);
        showComboBadge("Schild kaputt", true);
        updateHud();
        return;
      }
      state.lives -= 1;
      state.combo = 1;
      state.comboTimer = 0;
      state.comboTimerMax = comboDuration(1);
      state.invulnerableTimer = 1.15;
      state.shake = Math.min(26, state.shake + 15);
      addSparks(enemy.x, enemy.y, 18, 34, 280);
      addWave(enemy.x, enemy.y, 18, enemy.r + 20);
      state.enemies.splice(index, 1);
      showComboBadge(`Leben -1`, true);
      updateHud();
      if (state.lives <= 0) {
        startDeathSequence();
      }
    }

    function hitArmoredEnemy(enemy) {
      playSound("armorBounce");
      enemy.health -= 1;
      enemy.hitFlash = 0.18;
      enemy.hitCooldown = 0.26;
      state.combo = clamp(state.combo + 1, 1, 20);
      state.bestCombo = Math.max(state.bestCombo, state.combo);
      rememberClassicCombo();
      refreshComboTimer();
      state.score += Math.round(35 * state.combo);
      updateColorRunChallenges(enemy);
      state.shake = Math.min(10, state.shake + 3);
      addSparks(enemy.x, enemy.y, enemy.hue, 16, 190);
      addWave(enemy.x, enemy.y, enemy.hue, enemy.r + 3);
      if (state.combo > 2) {
        showComboBadge(`Armor Hit x${state.combo}`);
      }
      updateHud();
    }

    function hitBlackHole(enemy, index) {
      playSound("damage");
      if (state.mode === "items" && consumeActiveItem("shield")) {
        state.invulnerableTimer = 0.75;
        state.shake = Math.min(20, state.shake + 10);
        addSparks(enemy.x, enemy.y, 188, 32, 260);
        addWave(enemy.x, enemy.y, 188, enemy.r + 20);
        state.enemies.splice(index, 1);
        showComboBadge("Schild kaputt", true);
        updateHud();
        return;
      }
      const lossRate = rand(0.05, 0.10);
      const lost = Math.min(state.score, Math.ceil(state.score * lossRate));
      state.score -= lost;
      state.combo = 1;
      state.comboTimer = 0;
      state.comboTimerMax = comboDuration(1);
      state.shake = Math.min(24, state.shake + 14);
      addSparks(enemy.x, enemy.y, enemy.hue, 38, 310);
      addWave(enemy.x, enemy.y, enemy.hue, enemy.r + 18);
      state.enemies.splice(index, 1);
      showComboBadge(`Black Hole -${lost} (${Math.round(lossRate * 100)}%)`, true);
      updateHud();
    }

    function endGame() {
      if (state.mode === "chaos") {
        state.chaosBest = Math.max(state.chaosBest, state.elapsed);
        localStorage.setItem(gameModes.chaos.bestStorageKey, String(state.chaosBest));
      } else if (state.mode === "classic") {
        state.classicBestScore = Math.max(state.classicBestScore, state.score);
        localStorage.setItem("neonSlingshotClassicBestScore", String(state.classicBestScore));
      } else if (state.mode === "items") {
        state.itemsBest = Math.max(state.itemsBest, state.score);
        localStorage.setItem("neonSlingshotItemsBest", String(state.itemsBest));
      } else if (state.mode === "flow") {
        state.flowBest = Math.max(state.flowBest, state.score);
        localStorage.setItem("neonSlingshotFlowBest", String(state.flowBest));
      } else if (state.mode === "colorHunt") {
        state.colorHuntBest = Math.max(state.colorHuntBest, state.huntHits);
        localStorage.setItem("neonSlingshotColorHuntBest", String(state.colorHuntBest));
      }
      scheduleCloudSave({ immediate: true });
      state.running = false;
      state.paused = false;
      state.deathSequence = false;
      pauseBackgroundMusic();
      gameHud.hidden = true;
      pauseButton.hidden = true;
      pauseOverlay.hidden = true;
      if (state.mode === "chaos") {
        finalScoreEl.innerHTML = `<span class="score-label">Chaos Zeit</span><span class="score-number">${formatTime(state.elapsed)}</span><span class="combo-line">Bestzeit ${formatTime(state.chaosBest)}</span>`;
      } else if (state.mode === "colorHunt") {
        finalScoreEl.innerHTML = `<span class="score-label">Color Hunt</span><span class="score-number">${formatScore(state.huntHits)} Treffer</span><span class="combo-line">Bestwert ${formatScore(state.colorHuntBest)}</span>`;
      } else {
        finalScoreEl.innerHTML = `<span class="score-label">Final Score</span><span class="score-number">${formatScore(state.score)}</span><span class="combo-line">Beste Combo x${state.bestCombo}</span><span class="star-line">★ ${state.runStars} gesammelt · ${state.totalStars} gesamt</span>`;
      }
      state.collectibles = [];
      state.itemPickups = [];
      state.activeItems = [];
      updateItemHud();
      showScreen("gameOverScreen");
    }

    function shootToward(x, y, charge = 1) {
      if (!state.running || state.paused || state.deathSequence) {
        return;
      }
      if (state.shotCooldown > 0 && !hasActiveItem("noCooldown")) {
        return;
      }
      const player = state.player;
      const dx = x - player.x;
      const dy = y - player.y;
      const distance = Math.max(1, hypot(dx, dy));
      const force = clamp(distance * 3.15 * charge, 260, 980);
      player.vx += (dx / distance) * force;
      player.vy += (dy / distance) * force;
      state.shotCooldown = hasActiveItem("noCooldown") ? 0 : state.shotCooldownMax;
      playSlingshotSound(charge);
      addSparks(player.x, player.y, 188, 12, 145);
      addWave(player.x, player.y, 188, 28);
      state.shake = Math.min(8, state.shake + 2);
      updateHud();
    }

    function pointerPosition(event) {
      const rect = canvas.getBoundingClientRect();
      const cssX = event.clientX - rect.left;
      const cssY = event.clientY - rect.top;
      return {
        x: clamp(cssX / state.renderScale, 0, state.width),
        y: clamp(cssY / state.renderScale, 0, state.height)
      };
    }

    canvas.addEventListener("pointerdown", (event) => {
      if (!state.running || state.paused || state.deathSequence) return;
      canvas.setPointerCapture(event.pointerId);
      const pos = pointerPosition(event);
      pointer.down = true;
      pointer.id = event.pointerId;
      pointer.startX = pos.x;
      pointer.startY = pos.y;
      pointer.x = pos.x;
      pointer.y = pos.y;
      pointer.downAt = performance.now();
    });

    canvas.addEventListener("pointermove", (event) => {
      if (!pointer.down || pointer.id !== event.pointerId) return;
      const pos = pointerPosition(event);
      pointer.x = pos.x;
      pointer.y = pos.y;
    });

    function releasePointer(event) {
      if (!pointer.down || pointer.id !== event.pointerId) return;
      const heldFor = performance.now() - pointer.downAt;
      const dragDistance = hypot(pointer.x - pointer.startX, pointer.y - pointer.startY);
      const charge = clamp(0.78 + heldFor / 900 + dragDistance / 260, 0.85, 1.85);
      shootToward(pointer.x, pointer.y, charge);
      pointer.down = false;
      pointer.id = null;
    }
