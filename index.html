    function updatePlayer(dt) {
      const player = state.player;
      player.x += player.vx * dt;
      player.y += player.vy * dt;
      player.vx *= Math.pow(0.985, dt * 60);
      player.vy *= Math.pow(0.985, dt * 60);

      const speed = hypot(player.vx, player.vy);
      if (speed < 12) {
        player.vx *= 0.92;
        player.vy *= 0.92;
      }

      if (gameModes[state.mode]?.wrapPlayer) {
        let wrapped = false;
        if (player.x < -player.r) {
          player.x = state.width + player.r;
          wrapped = true;
        } else if (player.x > state.width + player.r) {
          player.x = -player.r;
          wrapped = true;
        }
        if (player.y < -player.r) {
          player.y = state.height + player.r;
          wrapped = true;
        } else if (player.y > state.height + player.r) {
          player.y = -player.r;
          wrapped = true;
        }
        if (wrapped) {
          player.trail = [];
          addSparks(clamp(player.x, player.r, state.width - player.r), clamp(player.y, player.r, state.height - player.r), 104, 8, 110);
        }
      } else {
        if (player.x < player.r) {
          player.x = player.r;
          player.vx = Math.abs(player.vx) * 0.9;
          addSparks(player.x, player.y, 188, 6, 90);
        } else if (player.x > state.width - player.r) {
          player.x = state.width - player.r;
          player.vx = -Math.abs(player.vx) * 0.9;
          addSparks(player.x, player.y, 188, 6, 90);
        }

        if (player.y < player.r) {
          player.y = player.r;
          player.vy = Math.abs(player.vy) * 0.9;
          addSparks(player.x, player.y, 188, 6, 90);
        } else if (player.y > state.height - player.r) {
          player.y = state.height - player.r;
          player.vy = -Math.abs(player.vy) * 0.9;
          addSparks(player.x, player.y, 188, 6, 90);
        }
      }

      if (state.mode === "chaos" && state.stillRunEligible) {
        const moved = hypot(player.x - state.stillStartX, player.y - state.stillStartY);
        if (moved > 4 || hypot(player.vx, player.vy) > 8) {
          state.stillRunEligible = false;
        }
      }

      player.trail.unshift({ x: player.x, y: player.y, life: 0.45, r: player.r });
      player.trail = player.trail.filter((dot) => {
        dot.life -= dt;
        return dot.life > 0;
      }).slice(0, 18);
    }

    function updateEnemies(dt) {
      if (state.mode === "chaos") {
        updateChaosMode(dt);
        return;
      }
      if (state.mode === "colorHunt") {
        updateColorHuntMode(dt);
        return;
      }
      state.spawnTimer -= dt;
      const pressure = scorePressure();
      const timePressure = clamp(state.elapsed / 180, 0, 1);
      const planetLimit = Math.min(8, 5 + Math.floor(state.score / 7000) + Math.floor(timePressure * 2));
      if (state.spawnTimer <= 0 && countPlanets() < planetLimit) {
        spawnEnemy();
        state.spawnDelay = clamp(state.spawnDelay * (0.994 - pressure * 0.0015), 1.02, 1.85);
        state.spawnTimer = state.spawnDelay;
      } else if (state.spawnTimer <= 0) {
        state.spawnTimer = 0.42;
      }

      state.normalBoostTimer -= dt;
      if (state.normalBoostTimer <= 0) {
        if (countPlanets() < planetLimit) {
          spawnEnemy("normal");
        }
        state.normalBoostTimer = clamp(5.4 - timePressure * 2.1 - pressure * 0.6, 3.0, 5.4);
      }

      state.collectibleTimer -= dt;
      if (state.collectibleTimer <= 0) {
        if (state.collectibles.length < 2) {
          spawnCollectibleStar();
        }
        state.collectibleTimer = rand(9.5, 15.5);
      }

      if (state.mode === "items") {
        updateItemsMode(dt);
      }

      state.meteorTimer -= dt;
      const meteorLimit = Math.min(7, 2 + Math.floor(state.elapsed / 22) + Math.floor(state.score / 5200));
      if (state.meteorTimer <= 0 && countEnemies("meteor") + state.meteorWarnings.length < meteorLimit) {
        queueMeteorWarning();
        state.meteorDelay = clamp(3.6 - state.elapsed * 0.02 - pressure * 0.45, 1.25, 3.6);
        state.meteorTimer = state.meteorDelay;
      } else if (state.meteorTimer <= 0) {
        state.meteorTimer = 0.35;
      }

      for (let i = state.enemies.length - 1; i >= 0; i--) {
        const enemy = state.enemies[i];
        enemy.x += enemy.vx * dt;
        enemy.y += enemy.vy * dt;
        enemy.angle += enemy.spin * dt;
        enemy.hitFlash = Math.max(0, enemy.hitFlash - dt);
        enemy.hitCooldown = Math.max(0, enemy.hitCooldown - dt);

        const out =
          enemy.x < -enemy.r * 2 ||
          enemy.x > state.width + enemy.r * 2 ||
          enemy.y < -enemy.r * 2 ||
          enemy.y > state.height + enemy.r * 2;

        if (out) {
          state.enemies.splice(i, 1);
          continue;
        }

        const dx = enemy.x - state.player.x;
        const dy = enemy.y - state.player.y;
        const distance = hypot(dx, dy);
        if (distance < enemy.r + state.player.r && enemy.hitCooldown <= 0) {
          if (enemy.type === "meteor") {
            if (hasActiveItem("strength")) {
              rememberStrengthMeteorKill();
              destroyEnemy(enemy, i, 260);
            } else {
              loseLife(enemy, i);
            }
            if (!state.running || state.deathSequence) return;
          } else if (enemy.type === "blackhole") {
            hitBlackHole(enemy, i);
          } else if (enemy.type === "armored" && enemy.health > 1) {
            hitArmoredEnemy(enemy);
          } else {
            destroyEnemy(enemy, i, enemy.type === "armored" ? 520 : 0);
          }
          const normalX = dx / Math.max(1, distance);
          const normalY = dy / Math.max(1, distance);
          state.player.vx -= normalX * 210;
          state.player.vy -= normalY * 210;
        }
      }
    }

    function spawnChaosObstacle() {
      const obstacle = createMeteorData();
      const roll = Math.random();
      if (roll < 0.12) {
        obstacle.variant = "giant";
        obstacle.r = rand(46, 66);
        obstacle.spin = rand(-1.8, 1.8);
      } else if (roll < 0.4) {
        obstacle.variant = "void";
        obstacle.r = rand(18, 27);
        obstacle.spin = rand(-5.2, 5.2);
      } else if (roll < 0.68) {
        obstacle.variant = "ice";
        obstacle.r = rand(23, 35);
      } else {
        obstacle.variant = "fire";
      }
      const speed = hypot(obstacle.vx, obstacle.vy);
      const chaosSpeed = speed + Math.min(95, 18 + state.elapsed * 1.45) - Math.max(0, obstacle.r - 34) * 1.25;
      const angle = Math.atan2(obstacle.vy, obstacle.vx);
      obstacle.vx = Math.cos(angle) * chaosSpeed;
      obstacle.vy = Math.sin(angle) * chaosSpeed;
      obstacle.warningX = clamp(obstacle.x, obstacle.r, state.width - obstacle.r);
      obstacle.warningY = clamp(obstacle.y, obstacle.r, state.height - obstacle.r);
      return obstacle;
    }

    function spawnChaosLaser() {
      const horizontal = Math.random() < 0.5;
      const diagonal = Math.random() < 0.28;
      const width = rand(54, 78);
      const angle = diagonal ? (Math.random() < 0.5 ? Math.PI / 4 : -Math.PI / 4) : horizontal ? 0 : Math.PI / 2;
      const offset = diagonal
        ? rand(-state.height * 0.18, state.height * 0.18)
        : horizontal
          ? rand(state.height * 0.22, state.height * 0.78)
          : rand(state.width * 0.18, state.width * 0.82);
      state.lasers.push({
        angle,
        offset,
        width,
        warning: 3,
        fire: 0.62,
        active: false,
        hit: false,
        firedSound: false
      });
      playSound("laserCharge");
    }

    function laserDistanceToPlayer(laser) {
      const player = state.player;
      if (Math.abs(laser.angle) < 0.01) {
        return Math.abs(player.y - laser.offset);
      }
      if (Math.abs(laser.angle - Math.PI / 2) < 0.01) {
        return Math.abs(player.x - laser.offset);
      }
      const centerX = state.width * 0.5;
      const centerY = state.height * 0.5 + laser.offset;
      const normalX = -Math.sin(laser.angle);
      const normalY = Math.cos(laser.angle);
      return Math.abs((player.x - centerX) * normalX + (player.y - centerY) * normalY);
    }

    function loseLifeFromHazard(x, y, radius = 28) {
      if (state.invulnerableTimer > 0 || state.deathSequence) return;
      playSound("damage");
      if (state.mode === "items" && consumeActiveItem("shield")) {
        state.invulnerableTimer = 0.75;
        state.shake = Math.min(24, state.shake + 12);
        addSparks(x, y, 188, 36, 280);
        addWave(x, y, 188, radius);
        showComboBadge("Schild kaputt", true);
        updateHud();
        return;
      }
      state.lives -= 1;
      state.combo = 1;
      state.comboTimer = 0;
      state.comboTimerMax = comboDuration(1);
      state.invulnerableTimer = 1.15;
      state.shake = Math.min(30, state.shake + 18);
      addSparks(x, y, 18, 42, 300);
      addWave(x, y, 18, radius);
      showComboBadge(`Leben -1`, true);
      updateHud();
      if (state.lives <= 0) {
        startDeathSequence();
      }
    }

    function spawnChaosMine() {
      const edge = Math.floor(rand(0, 4));
      const r = rand(13, 17);
      let x;
      let y;
      if (edge === 0) {
        x = rand(r, state.width - r);
        y = -r;
      } else if (edge === 1) {
        x = state.width + r;
        y = rand(r, state.height - r);
      } else if (edge === 2) {
        x = rand(r, state.width - r);
        y = state.height + r;
      } else {
        x = -r;
        y = rand(r, state.height - r);
      }
      const targetX = rand(state.width * 0.18, state.width * 0.82);
      const targetY = rand(state.height * 0.2, state.height * 0.82);
      const angle = Math.atan2(targetY - y, targetX - x);
      const speed = rand(135, 185);
      state.mines.push({
        x,
        y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        approachSpeed: speed,
        targetX,
        targetY,
        r,
        radius: rand(62, 86),
        state: "flying",
        armTimer: 2.35,
        explodeTimer: 0,
        angle: rand(0, TAU),
        spin: rand(-4.5, 4.5),
        hit: false,
        armedSound: false
      });
      playSound("mineFly");
    }

    function explodeMine(mine, index) {
      if (mine.hit) return;
      mine.hit = true;
      mine.state = "exploding";
      mine.explodeTimer = 0.34;
      playSound("mineExplode");
      state.shake = Math.min(30, state.shake + 16);
      addSparks(mine.x, mine.y, 38, 46, 330);
      addWave(mine.x, mine.y, 38, mine.radius);
      const distance = hypot(mine.x - state.player.x, mine.y - state.player.y);
      if (distance < mine.radius + state.player.r) {
        loseLifeFromHazard(state.player.x, state.player.y, mine.radius);
      }
    }

    function spawnChaosStarPair() {
      const edge = Math.floor(rand(0, 4));
      const orbitRadius = rand(30, 44);
      const r = rand(8.5, 11.5);
      let x;
      let y;
      if (edge === 0) {
        x = rand(orbitRadius, state.width - orbitRadius);
        y = -orbitRadius * 1.5;
      } else if (edge === 1) {
        x = state.width + orbitRadius * 1.5;
        y = rand(orbitRadius, state.height - orbitRadius);
      } else if (edge === 2) {
        x = rand(orbitRadius, state.width - orbitRadius);
        y = state.height + orbitRadius * 1.5;
      } else {
        x = -orbitRadius * 1.5;
        y = rand(orbitRadius, state.height - orbitRadius);
      }

      const targetX = state.player.x + rand(-state.width * 0.18, state.width * 0.18);
      const targetY = state.player.y + rand(-state.height * 0.18, state.height * 0.18);
      const angle = Math.atan2(targetY - y, targetX - x);
      const speed = rand(112, 158) + Math.min(58, state.elapsed * 0.7);
      const spin = rand(2.2, 3.7) * (Math.random() < 0.5 ? -1 : 1);
      state.starPairs.push({
        x,
        y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        orbitRadius,
        r,
        angle: rand(0, TAU),
        spin,
        hueA: rand(46, 62),
        hueB: rand(185, 205),
        hit: false
      });
      playSound("starPair");
    }

    function getStarPairPoints(pair) {
      const offsetX = Math.cos(pair.angle) * pair.orbitRadius;
      const offsetY = Math.sin(pair.angle) * pair.orbitRadius;
      return [
        { x: pair.x + offsetX, y: pair.y + offsetY, hue: pair.hueA },
        { x: pair.x - offsetX, y: pair.y - offsetY, hue: pair.hueB }
      ];
    }

    function updateChaosMode(dt) {
      state.meteorTimer -= dt;
      const obstacleLimit = Math.min(8, 3 + Math.floor(state.elapsed / 28));
      if (state.meteorTimer <= 0 && countEnemies("meteor") + state.meteorWarnings.length < obstacleLimit) {
        const obstacle = spawnChaosObstacle();
        queueMeteorWarning(obstacle, obstacle.variant === "giant" ? 1.55 : 1.25);
        state.meteorDelay = clamp(1.55 - state.elapsed * 0.006, 0.72, 1.55);
        state.meteorTimer = state.meteorDelay;
      } else if (state.meteorTimer <= 0) {
        state.meteorTimer = 0.32;
      }

      if (state.elapsed >= CHAOS_LASER_START) {
        state.laserTimer -= dt;
        if (state.laserTimer <= 0 && state.lasers.length < 2) {
          spawnChaosLaser();
          state.laserTimer = rand(9, 14);
        }
      }

      if (state.elapsed >= CHAOS_MINE_START) {
        state.mineTimer -= dt;
        if (state.mineTimer <= 0 && state.mines.length < 3) {
          spawnChaosMine();
          state.mineTimer = rand(7.5, 12);
        }
      }

      if (state.elapsed >= CHAOS_STAR_PAIR_START) {
        state.starPairTimer -= dt;
        if (state.starPairTimer <= 0 && state.starPairs.length < 3) {
          spawnChaosStarPair();
          state.starPairTimer = rand(6.5, 10.5);
        }
      }

      for (let i = state.enemies.length - 1; i >= 0; i--) {
        const enemy = state.enemies[i];
        enemy.x += enemy.vx * dt;
        enemy.y += enemy.vy * dt;
        enemy.angle += enemy.spin * dt;
        enemy.hitFlash = Math.max(0, enemy.hitFlash - dt);
        enemy.hitCooldown = Math.max(0, enemy.hitCooldown - dt);

        const out =
          enemy.x < -enemy.r * 2 ||
          enemy.x > state.width + enemy.r * 2 ||
          enemy.y < -enemy.r * 2 ||
          enemy.y > state.height + enemy.r * 2;

        if (out) {
          state.enemies.splice(i, 1);
          continue;
        }

        const dx = enemy.x - state.player.x;
        const dy = enemy.y - state.player.y;
        const distance = hypot(dx, dy);
        if (distance < enemy.r + state.player.r && enemy.hitCooldown <= 0) {
          loseLife(enemy, i);
          return;
        }
      }

      for (let i = state.lasers.length - 1; i >= 0; i--) {
        const laser = state.lasers[i];
        if (!laser.active) {
          laser.warning -= dt;
          if (laser.warning <= 0) {
            laser.active = true;
            if (!laser.firedSound) {
              laser.firedSound = true;
              playSound("laserFire");
            }
          }
        } else {
          laser.fire -= dt;
          if (!laser.hit && laserDistanceToPlayer(laser) < laser.width * 0.5 + state.player.r) {
            laser.hit = true;
            loseLifeFromHazard(state.player.x, state.player.y, laser.width);
          }
          if (laser.fire <= 0) {
            state.lasers.splice(i, 1);
          }
        }
      }

      for (let i = state.mines.length - 1; i >= 0; i--) {
        const mine = state.mines[i];
        mine.angle += mine.spin * dt;
        if (mine.state === "flying") {
          const toTargetX = mine.targetX - mine.x;
          const toTargetY = mine.targetY - mine.y;
          const distanceToTargetBeforeMove = hypot(toTargetX, toTargetY);
          const directionX = toTargetX / Math.max(1, distanceToTargetBeforeMove);
          const directionY = toTargetY / Math.max(1, distanceToTargetBeforeMove);
          const desiredSpeed = clamp(distanceToTargetBeforeMove * 2.6, 18, mine.approachSpeed);
          mine.vx += (directionX * desiredSpeed - mine.vx) * Math.min(1, dt * 4.8);
          mine.vy += (directionY * desiredSpeed - mine.vy) * Math.min(1, dt * 4.8);
          const stepDistance = hypot(mine.vx, mine.vy) * dt;
          mine.x += mine.vx * dt;
          mine.y += mine.vy * dt;
          const distanceToTarget = hypot(mine.targetX - mine.x, mine.targetY - mine.y);
          if (distanceToTarget < Math.max(5, stepDistance * 0.8) && hypot(mine.vx, mine.vy) < 34) {
            mine.x = mine.targetX;
            mine.y = mine.targetY;
            mine.vx = 0;
            mine.vy = 0;
            mine.state = "armed";
            if (!mine.armedSound) {
              mine.armedSound = true;
              playSound("mineArm");
            }
          }
        } else if (mine.state === "armed") {
          mine.armTimer -= dt;
          if (mine.armTimer <= 0) {
            explodeMine(mine, i);
          }
        } else if (mine.state === "exploding") {
          mine.explodeTimer -= dt;
          if (mine.explodeTimer <= 0) {
            state.mines.splice(i, 1);
            continue;
          }
        }

        if (mine.state !== "exploding") {
          const hitDistance = hypot(mine.x - state.player.x, mine.y - state.player.y);
          if (hitDistance < mine.r + state.player.r) {
            explodeMine(mine, i);
          }
        }
      }

      for (let i = state.starPairs.length - 1; i >= 0; i--) {
        const pair = state.starPairs[i];
        pair.x += pair.vx * dt;
        pair.y += pair.vy * dt;
        pair.angle += pair.spin * dt;

        const margin = pair.orbitRadius * 2.4;
        const out =
          pair.x < -margin ||
          pair.x > state.width + margin ||
          pair.y < -margin ||
          pair.y > state.height + margin;
        if (out) {
          state.starPairs.splice(i, 1);
          continue;
        }

        const points = getStarPairPoints(pair);
        for (const point of points) {
          const distance = hypot(point.x - state.player.x, point.y - state.player.y);
          if (distance < pair.r + state.player.r) {
            pair.hit = true;
            addSparks(point.x, point.y, point.hue, 28, 240);
            state.starPairs.splice(i, 1);
            loseLifeFromHazard(point.x, point.y, pair.orbitRadius);
            break;
          }
        }
      }
    }

    function updateItemsMode(dt) {
      state.itemTimer -= dt;
      if (state.itemTimer <= 0) {
        if (state.itemPickups.length < 2) {
          spawnItemPickup();
        }
        state.itemTimer = rand(10.5, 15.5);
      }

      for (let i = state.itemPickups.length - 1; i >= 0; i--) {
        const item = state.itemPickups[i];
        item.life -= dt;
        item.angle += item.spin * dt;
        if (item.life <= 0) {
          state.itemPickups.splice(i, 1);
          continue;
        }

        const distance = hypot(item.x - state.player.x, item.y - state.player.y);
        if (distance < item.r + state.player.r + 8) {
          collectItem(item, i);
        }
      }
    }

    function updateColorHuntMode(dt) {
      state.spawnTimer -= dt;
      const planetLimit = Math.min(12, 6 + Math.floor(state.huntHits / 7));
      if (state.spawnTimer <= 0 && state.enemies.length < planetLimit) {
        const forcedColorId = hasHuntTargetOnField() ? null : state.huntTargetId;
        spawnColorHuntPlanet(forcedColorId);
        state.spawnDelay = clamp(1.05 - state.huntHits * 0.012, 0.48, 1.05);
        state.spawnTimer = state.spawnDelay;
      } else if (state.spawnTimer <= 0) {
        state.spawnTimer = 0.24;
      }

      for (let i = state.enemies.length - 1; i >= 0; i--) {
        const enemy = state.enemies[i];
        enemy.x += enemy.vx * dt;
        enemy.y += enemy.vy * dt;
        enemy.angle += enemy.spin * dt;
        enemy.hitFlash = Math.max(0, enemy.hitFlash - dt);
        enemy.hitCooldown = Math.max(0, enemy.hitCooldown - dt);

        const out =
          enemy.x < -enemy.r * 2 ||
          enemy.x > state.width + enemy.r * 2 ||
          enemy.y < -enemy.r * 2 ||
          enemy.y > state.height + enemy.r * 2;

        if (out) {
          state.enemies.splice(i, 1);
          continue;
        }

        const dx = enemy.x - state.player.x;
        const dy = enemy.y - state.player.y;
        const distance = hypot(dx, dy);
        if (distance < enemy.r + state.player.r && enemy.hitCooldown <= 0) {
          if (enemy.colorId === state.huntTargetId) {
            destroyHuntPlanet(enemy, i);
          } else {
            loseLife(enemy, i);
            if (!state.running || state.deathSequence) return;
          }
          const normalX = dx / Math.max(1, distance);
          const normalY = dy / Math.max(1, distance);
          state.player.vx -= normalX * 180;
          state.player.vy -= normalY * 180;
        }
      }
    }

    function updateEnemyMotion(dt) {
      for (let i = state.enemies.length - 1; i >= 0; i--) {
        const enemy = state.enemies[i];
        enemy.x += enemy.vx * dt;
        enemy.y += enemy.vy * dt;
        enemy.angle += enemy.spin * dt;
        enemy.hitFlash = Math.max(0, enemy.hitFlash - dt);
        enemy.hitCooldown = Math.max(0, enemy.hitCooldown - dt);

        const out =
          enemy.x < -enemy.r * 2 ||
          enemy.x > state.width + enemy.r * 2 ||
          enemy.y < -enemy.r * 2 ||
          enemy.y > state.height + enemy.r * 2;

        if (out) {
          state.enemies.splice(i, 1);
        }
      }
    }

    function updateCollectibles(dt) {
      const player = state.player;
      for (let i = state.collectibles.length - 1; i >= 0; i--) {
        const star = state.collectibles[i];
        star.life -= dt;
        star.angle += star.spin * dt;
        if (star.life <= 0) {
          state.collectibles.splice(i, 1);
          continue;
        }

        const dx = star.x - player.x;
        const dy = star.y - player.y;
        const distance = hypot(dx, dy);
        if (distance < player.r + star.r + 9) {
          collectStar(star, i);
        }
      }
    }

    function updateEffects(dt, realDt = dt) {
      state.elapsed += dt;
      if (state.mode === "chaos") {
        if (state.stillRunEligible) {
          if (state.elapsed > state.stillBest) {
            state.stillBest = state.elapsed;
            saveStillBest();
          }
          if (state.elapsed >= 25) {
            completeChallenge("ghost-still-25");
          }
        }
        updateHud();
      }
      state.shotCooldown = Math.max(0, state.shotCooldown - dt);
      if (hasActiveItem("noCooldown")) {
        state.shotCooldown = 0;
      }
      for (let i = state.activeItems.length - 1; i >= 0; i--) {
        const item = state.activeItems[i];
        item.remaining -= realDt;
        if (item.remaining <= 0) {
          state.activeItems.splice(i, 1);
        }
      }
      updateItemHud();
      state.invulnerableTimer = Math.max(0, state.invulnerableTimer - dt);
      state.comboTimer -= dt;
      if (state.comboTimer <= 0 && state.combo > 1) {
        state.combo = 1;
        state.comboTimerMax = comboDuration(1);
        updateHud();
      }
      if (state.comboTimer > 0) {
        comboProgressFill.style.width = state.combo > 1 ? `${clamp(state.comboTimer / state.comboTimerMax, 0, 1) * 100}%` : "0%";
      }

      state.shake = Math.max(0, state.shake - dt * 28);

      for (let i = state.meteorWarnings.length - 1; i >= 0; i--) {
        const warning = state.meteorWarnings[i];
        warning.life -= dt;
        if (warning.life <= 0) {
          spawnMeteor(warning.meteor);
          state.meteorWarnings.splice(i, 1);
        }
      }

      for (const star of state.stars) {
        star.y += star.speed * dt;
        if (star.y > state.height + 4) {
          star.y = -4;
          star.x = Math.random() * state.width;
        }
      }

      state.sparks = state.sparks.filter((spark) => {
        spark.life -= dt;
        spark.x += spark.vx * dt;
        spark.y += spark.vy * dt;
        spark.vx *= Math.pow(0.92, dt * 60);
        spark.vy *= Math.pow(0.92, dt * 60);
        return spark.life > 0;
      });

      state.waves = state.waves.filter((wave) => {
        wave.life -= dt;
        wave.radius += dt * 210;
        return wave.life > 0;
      });
    }

    function drawGrid(time) {
      ctx.save();
      ctx.translate(state.width * 0.5, state.height * 0.46);
      ctx.transform(1, -0.035, 0.13, 0.86, 0, 0);
      ctx.translate(-state.width * 0.5, -state.height * 0.46);
      ctx.globalAlpha = 0.2;
      ctx.strokeStyle = "rgba(53, 234, 255, 0.16)";
      ctx.lineWidth = 1;
      const gap = 46;
      const offset = (time * 0.018) % gap;
      const bleed = Math.max(state.width, state.height) * 0.35;
      for (let x = -bleed - gap + offset; x < state.width + bleed + gap; x += gap) {
        ctx.beginPath();
        ctx.moveTo(x, -bleed);
        ctx.lineTo(x, state.height + bleed);
        ctx.stroke();
      }
      for (let y = -bleed + offset; y < state.height + bleed + gap; y += gap) {
        ctx.beginPath();
        ctx.moveTo(-bleed, y);
        ctx.lineTo(state.width + bleed, y);
        ctx.stroke();
      }

      ctx.globalAlpha = 0.08;
      ctx.strokeStyle = "rgba(168, 255, 104, 0.14)";
      const centerGap = gap * 2;
      for (let x = -bleed - centerGap + offset; x < state.width + bleed + centerGap; x += centerGap) {
        ctx.beginPath();
        ctx.moveTo(x, -bleed);
        ctx.lineTo(x, state.height + bleed);
        ctx.stroke();
      }
      for (let y = -bleed + offset; y < state.height + bleed + centerGap; y += centerGap) {
        ctx.beginPath();
        ctx.moveTo(-bleed, y);
        ctx.lineTo(state.width + bleed, y);
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawStars() {
      ctx.save();
      for (const star of state.stars) {
        ctx.globalAlpha = star.alpha;
        ctx.fillStyle = "#d8fbff";
        ctx.beginPath();
        ctx.arc(star.x, star.y, star.size, 0, TAU);
        ctx.fill();
      }
      ctx.restore();
    }

    function drawMeteorWarnings(time) {
      ctx.save();
      for (const warning of state.meteorWarnings) {
        const meteor = warning.meteor;
        const progress = 1 - warning.life / warning.maxLife;
        const pulse = 0.5 + Math.sin(time * 0.018) * 0.5;
        const alpha = 0.18 + progress * 0.42 + pulse * 0.12;
        const size = clamp(meteor.r * 0.9, 10, 22);

        ctx.save();
        ctx.translate(meteor.warningX, meteor.warningY);
        ctx.globalAlpha = alpha;
        ctx.shadowBlur = 14;
        ctx.shadowColor = "rgba(255, 209, 102, 0.9)";
        ctx.strokeStyle = "rgba(255, 209, 102, 0.82)";
        ctx.fillStyle = "rgba(255, 77, 109, 0.12)";
        ctx.lineWidth = 2;

        ctx.beginPath();
        ctx.arc(0, 0, size + pulse * 4, 0, TAU);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(0, -size);
        ctx.lineTo(size * 0.82, size * 0.58);
        ctx.lineTo(-size * 0.82, size * 0.58);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
        ctx.restore();
      }
      ctx.restore();
    }

    function drawChaosLasers(time) {
      if (!state.lasers.length) return;
      ctx.save();
      for (const laser of state.lasers) {
        const pulse = 0.5 + Math.sin(time * 0.018) * 0.5;
        const alpha = laser.active ? 0.92 : 0.14 + pulse * 0.1;
        const lineLength = Math.hypot(state.width, state.height) * 1.4;
        const flicker = 0.75 + Math.sin(time * 0.055) * 0.25;

        ctx.save();
        if (Math.abs(laser.angle) < 0.01) {
          ctx.translate(state.width * 0.5, laser.offset);
        } else if (Math.abs(laser.angle - Math.PI / 2) < 0.01) {
          ctx.translate(laser.offset, state.height * 0.5);
          ctx.rotate(Math.PI / 2);
        } else {
          ctx.translate(state.width * 0.5, state.height * 0.5 + laser.offset);
          ctx.rotate(laser.angle);
        }

        ctx.globalAlpha = alpha;
        ctx.lineCap = "round";
        ctx.shadowBlur = laser.active ? 42 : 14;
        ctx.shadowColor = laser.active ? "rgba(255, 62, 191, 0.96)" : "rgba(255, 209, 102, 0.75)";

        ctx.strokeStyle = laser.active ? "rgba(255, 62, 191, 0.28)" : "rgba(255, 209, 102, 0.22)";
        ctx.lineWidth = laser.width;
        ctx.beginPath();
        ctx.moveTo(-lineLength * 0.5, 0);
        ctx.lineTo(lineLength * 0.5, 0);
        ctx.stroke();

        ctx.globalAlpha = laser.active ? 0.86 : 0.46;
        ctx.strokeStyle = laser.active ? "rgba(53, 234, 255, 0.72)" : "rgba(255, 245, 220, 0.46)";
        ctx.lineWidth = laser.active ? laser.width * 0.42 : 3;
        ctx.setLineDash(laser.active ? [] : [14, 12]);
        ctx.beginPath();
        ctx.moveTo(-lineLength * 0.5, 0);
        ctx.lineTo(lineLength * 0.5, 0);
        ctx.stroke();

        ctx.setLineDash([]);
        ctx.globalAlpha = laser.active ? 1 : 0.58;
        ctx.strokeStyle = laser.active ? `rgba(255, 245, 255, ${0.78 + flicker * 0.2})` : "rgba(255, 245, 220, 0.52)";
        ctx.lineWidth = laser.active ? 7 + flicker * 4 : 2;
        ctx.beginPath();
        ctx.moveTo(-lineLength * 0.5, 0);
        ctx.lineTo(lineLength * 0.5, 0);
        ctx.stroke();

        if (laser.active) {
          ctx.globalAlpha = 0.72;
          ctx.strokeStyle = "rgba(255, 209, 102, 0.78)";
          ctx.lineWidth = 2;
          for (let i = -2; i <= 2; i++) {
            const y = i * laser.width * 0.18 + Math.sin(time * 0.025 + i) * 3;
            ctx.beginPath();
            ctx.moveTo(-lineLength * 0.5, y);
            ctx.lineTo(lineLength * 0.5, y);
            ctx.stroke();
          }
        }
        ctx.restore();
      }
      ctx.restore();
    }

    function traceStarShape(targetCtx, radius, innerRadius = radius * 0.45) {
      targetCtx.beginPath();
      for (let i = 0; i < 10; i++) {
        const angle = -Math.PI / 2 + (i / 10) * TAU;
        const pointRadius = i % 2 === 0 ? radius : innerRadius;
        const x = Math.cos(angle) * pointRadius;
        const y = Math.sin(angle) * pointRadius;
        if (i === 0) targetCtx.moveTo(x, y);
        else targetCtx.lineTo(x, y);
      }
      targetCtx.closePath();
    }

    function drawChaosStarPairs(time) {
      if (!state.starPairs.length) return;
      ctx.save();
      ctx.lineCap = "round";
      for (const pair of state.starPairs) {
        const points = getStarPairPoints(pair);
        const pulse = 0.5 + Math.sin(time * 0.018 + pair.x * 0.03) * 0.5;

        ctx.save();
        ctx.globalAlpha = 0.18 + pulse * 0.08;
        ctx.strokeStyle = "rgba(255, 245, 205, 0.62)";
        ctx.lineWidth = 2;
        ctx.shadowBlur = 14;
        ctx.shadowColor = "rgba(255, 209, 102, 0.68)";
        ctx.beginPath();
        ctx.moveTo(points[0].x, points[0].y);
        ctx.lineTo(points[1].x, points[1].y);
        ctx.stroke();
        ctx.restore();

        for (let i = 0; i < points.length; i++) {
          const point = points[i];
          ctx.save();
          ctx.translate(point.x, point.y);
          ctx.rotate(pair.angle * (i === 0 ? 1 : -1) + time * 0.002);
          ctx.globalAlpha = 0.88;
          ctx.shadowBlur = 20 + pulse * 12;
          ctx.shadowColor = `hsla(${point.hue}, 100%, 66%, 0.95)`;
          ctx.fillStyle = `hsl(${point.hue}, 100%, ${62 + pulse * 8}%)`;
          ctx.strokeStyle = "rgba(255, 255, 255, 0.76)";
          ctx.lineWidth = 1.6;
          traceStarShape(ctx, pair.r + pulse * 1.4, pair.r * 0.46);
          ctx.fill();
          ctx.stroke();

          ctx.globalAlpha = 0.24;
          ctx.fillStyle = `hsla(${point.hue}, 100%, 65%, 0.22)`;
          ctx.beginPath();
          ctx.arc(0, 0, pair.r + 9 + pulse * 4, 0, TAU);
          ctx.fill();
          ctx.restore();
        }
      }
      ctx.restore();
    }

    function drawChaosMines(time) {
      if (!state.mines.length) return;
      ctx.save();
      for (const mine of state.mines) {
        const pulse = 0.5 + Math.sin(time * 0.014 + mine.x) * 0.5;
        ctx.save();
        ctx.translate(mine.x, mine.y);

        if (mine.state !== "flying") {
          const radiusAlpha = mine.state === "exploding" ? mine.explodeTimer / 0.34 : 0.18 + pulse * 0.16;
          ctx.globalAlpha = radiusAlpha;
          ctx.fillStyle = "rgba(255, 77, 109, 0.16)";
          ctx.strokeStyle = "rgba(255, 209, 102, 0.72)";
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(0, 0, mine.radius, 0, TAU);
          ctx.fill();
          ctx.stroke();
        }

        if (mine.state === "exploding") {
          ctx.globalAlpha = Math.max(0, mine.explodeTimer / 0.34);
          ctx.shadowBlur = 42;
          ctx.shadowColor = "rgba(255, 77, 109, 0.95)";
          ctx.fillStyle = "rgba(255, 209, 102, 0.5)";
          ctx.beginPath();
          ctx.arc(0, 0, mine.radius * (1 - mine.explodeTimer / 0.34), 0, TAU);
          ctx.fill();
          ctx.restore();
          continue;
        }

        ctx.rotate(mine.angle);
        ctx.globalAlpha = 1;
        ctx.shadowBlur = 22 + pulse * 12;
        ctx.shadowColor = "rgba(255, 77, 109, 0.88)";
        const gradient = ctx.createRadialGradient(-mine.r * 0.35, -mine.r * 0.35, mine.r * 0.1, 0, 0, mine.r * 1.15);
        gradient.addColorStop(0, "#fff0b8");
        gradient.addColorStop(0.35, "#ff4d6d");
        gradient.addColorStop(1, "#260911");
        ctx.fillStyle = gradient;
        ctx.beginPath();
        for (let i = 0; i < 8; i++) {
          const angle = (i / 8) * TAU;
          const radius = i % 2 === 0 ? mine.r * 1.18 : mine.r * 0.72;
          const x = Math.cos(angle) * radius;
          const y = Math.sin(angle) * radius;
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.fill();
        ctx.lineWidth = 2;
        ctx.strokeStyle = "rgba(255, 240, 205, 0.72)";
        ctx.stroke();
        ctx.restore();
      }
      ctx.restore();
    }

    function drawPlayerShape(shapeId, radius, time, targetCtx = ctx) {
      const t = time / 1000;
      targetCtx.beginPath();
      if (shapeId === "diamond") {
        targetCtx.rotate(t * 2.4);
        const bladeWidth = radius * 0.34;
        targetCtx.moveTo(0, -radius);
        targetCtx.lineTo(bladeWidth, -bladeWidth);
        targetCtx.lineTo(radius, 0);
        targetCtx.lineTo(bladeWidth, bladeWidth);
        targetCtx.lineTo(0, radius);
        targetCtx.lineTo(-bladeWidth, bladeWidth);
        targetCtx.lineTo(-radius, 0);
        targetCtx.lineTo(-bladeWidth, -bladeWidth);
        targetCtx.closePath();
      } else if (shapeId === "star") {
        const pulse = 1 + Math.sin(t * 5.8) * 0.08;
        for (let i = 0; i < 10; i++) {
          const pointRadius = (i % 2 === 0 ? radius : radius * 0.48) * pulse;
          const angle = -Math.PI / 2 + (i / 10) * TAU;
          const x = Math.cos(angle) * pointRadius;
          const y = Math.sin(angle) * pointRadius;
          if (i === 0) targetCtx.moveTo(x, y);
          else targetCtx.lineTo(x, y);
        }
        targetCtx.closePath();
      } else if (shapeId === "shard") {
        const pulse = 1 + Math.sin(t * 7.2) * 0.09;
        for (let i = 0; i < 16; i++) {
          const angle = -Math.PI / 2 + (i / 16) * TAU;
          const lobe = Math.sin(angle * 4 + t * 2.4) * 0.12;
          const pointRadius = radius * (0.72 + lobe + (i % 2 === 0 ? 0.2 : -0.06)) * pulse;
          const x = Math.cos(angle) * pointRadius;
          const y = Math.sin(angle) * pointRadius;
          if (i === 0) targetCtx.moveTo(x, y);
          else targetCtx.lineTo(x, y);
        }
        targetCtx.closePath();
      } else if (shapeId === "hex") {
        targetCtx.rotate(t * 1.25);
        for (let i = 0; i < 18; i++) {
          const angle = (i / 18) * TAU;
          const pointRadius = radius * (i % 2 === 0 ? 0.92 : 0.64);
          const x = Math.cos(angle) * pointRadius;
          const y = Math.sin(angle) * pointRadius;
          if (i === 0) targetCtx.moveTo(x, y);
          else targetCtx.lineTo(x, y);
        }
        targetCtx.closePath();
      } else {
        targetCtx.arc(0, 0, radius, 0, TAU);
      }
    }

    function drawPlayerShapeDetails(shapeId, radius, time, color, targetCtx = ctx) {
      if (shapeId === "core") {
        const pulse = 0.5 + Math.sin(time / 130) * 0.5;
        targetCtx.shadowBlur = 16;
        targetCtx.fillStyle = color.glow;
        targetCtx.beginPath();
        targetCtx.arc(0, 0, radius * 0.42, 0, TAU);
        targetCtx.fill();
        targetCtx.lineWidth = 2;
        targetCtx.strokeStyle = color.ready;
        targetCtx.beginPath();
        targetCtx.arc(0, 0, radius * (0.72 + pulse * 0.18), 0, TAU);
        targetCtx.stroke();
      } else if (shapeId === "hex") {
        const orbitTime = time / 620;
        targetCtx.lineWidth = 1.6;
        targetCtx.strokeStyle = color.ready;
        targetCtx.shadowBlur = 14;
        targetCtx.shadowColor = color.ready;
        targetCtx.beginPath();
        targetCtx.ellipse(0, 0, radius * 1.18, radius * 0.48, orbitTime * 0.55, 0, TAU);
        targetCtx.stroke();
        targetCtx.beginPath();
        targetCtx.ellipse(0, 0, radius * 1.18, radius * 0.48, orbitTime * 0.55 + Math.PI / 2, 0, TAU);
        targetCtx.stroke();
        targetCtx.fillStyle = color.ready;
        for (let i = 0; i < 3; i++) {
          const angle = orbitTime + (i / 3) * TAU;
          targetCtx.beginPath();
          targetCtx.arc(Math.cos(angle) * radius * 1.02, Math.sin(angle) * radius * 1.02, radius * 0.15, 0, TAU);
          targetCtx.fill();
        }
      }
    }

    function drawEnemy(enemy) {
      ctx.save();

      if (enemy.type === "meteor") {
        const speed = Math.max(1, hypot(enemy.vx, enemy.vy));
        const backX = -enemy.vx / speed;
        const backY = -enemy.vy / speed;
        const sideX = -backY;
        const sideY = backX;
        const tailLength = enemy.r * 2.9;
        const tailWidth = enemy.r * 0.82;

        const meteorPalette = enemy.variant === "giant"
          ? { shadow: "rgba(255, 209, 102, 0.72)", tail: "rgba(255, 209, 102, 0.14)", core: "#fff0b8", mid: "#ff8a3d", edge: "#24130d", stroke: "rgba(255, 240, 205, 0.76)" }
          : enemy.variant === "void"
          ? { shadow: "rgba(112, 78, 255, 0.76)", tail: "rgba(112, 78, 255, 0.18)", core: "#b298ff", mid: "#704eff", edge: "#090613", stroke: "rgba(216, 205, 255, 0.58)" }
          : enemy.variant === "ice"
            ? { shadow: "rgba(53, 234, 255, 0.74)", tail: "rgba(53, 234, 255, 0.18)", core: "#ecffe9", mid: "#35eaff", edge: "#12345a", stroke: "rgba(216, 251, 255, 0.62)" }
            : { shadow: "rgba(255, 77, 109, 0.7)", tail: "rgba(255, 77, 109, 0.2)", core: "#ffd166", mid: "#ff8a3d", edge: "#45211b", stroke: "rgba(255, 240, 205, 0.62)" };

        ctx.shadowBlur = 18;
        ctx.shadowColor = meteorPalette.shadow;
        ctx.fillStyle = meteorPalette.tail;
        ctx.beginPath();
        ctx.moveTo(enemy.x + sideX * tailWidth, enemy.y + sideY * tailWidth);
        ctx.lineTo(enemy.x + backX * tailLength, enemy.y + backY * tailLength);
        ctx.lineTo(enemy.x - sideX * tailWidth, enemy.y - sideY * tailWidth);
        ctx.closePath();
        ctx.fill();

        ctx.translate(enemy.x, enemy.y);
        ctx.rotate(enemy.angle);
        ctx.shadowBlur = 22;
        ctx.shadowColor = meteorPalette.shadow;
        const gradient = ctx.createRadialGradient(-enemy.r * 0.3, -enemy.r * 0.35, enemy.r * 0.1, 0, 0, enemy.r);
        gradient.addColorStop(0, meteorPalette.core);
        gradient.addColorStop(0.4, meteorPalette.mid);
        gradient.addColorStop(1, meteorPalette.edge);
        ctx.fillStyle = gradient;
        ctx.beginPath();
        for (let i = 0; i < enemy.vertices.length; i++) {
          const angle = (i / enemy.vertices.length) * TAU;
          const radius = enemy.r * enemy.vertices[i];
          const x = Math.cos(angle) * radius;
          const y = Math.sin(angle) * radius;
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.fill();

        ctx.lineWidth = 2;
        ctx.strokeStyle = meteorPalette.stroke;
        ctx.stroke();
        ctx.restore();
        return;
      }

      ctx.translate(enemy.x, enemy.y);
      ctx.rotate(enemy.angle);

      if (enemy.type === "blackhole") {
        ctx.shadowBlur = 34;
        ctx.shadowColor = "rgba(112, 78, 255, 0.96)";
        const gradient = ctx.createRadialGradient(0, 0, enemy.r * 0.08, 0, 0, enemy.r * 1.18);
        gradient.addColorStop(0, "#000000");
        gradient.addColorStop(0.45, "#090613");
        gradient.addColorStop(0.76, "#33205f");
        gradient.addColorStop(1, "rgba(112, 78, 255, 0.15)");
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.arc(0, 0, enemy.r * 1.08, 0, TAU);
        ctx.fill();

        ctx.lineWidth = 3;
        ctx.strokeStyle = "rgba(178, 152, 255, 0.82)";
        ctx.beginPath();
        ctx.ellipse(0, 0, enemy.r * 1.15, enemy.r * 0.48, 0.35, 0, TAU);
        ctx.stroke();

        ctx.lineWidth = 2;
        ctx.strokeStyle = "rgba(255, 255, 255, 0.28)";
        ctx.beginPath();
        ctx.arc(0, 0, enemy.r * 0.42, 0, TAU);
        ctx.stroke();
        ctx.restore();
        return;
      }

      if (enemy.type === "rainbow") {
        const now = performance.now();
        ctx.shadowBlur = 34;
        ctx.shadowColor = "rgba(255, 255, 255, 0.88)";
        const gradient = ctx.createConicGradient(now / 900, 0, 0);
        gradient.addColorStop(0, "#ff3ebf");
        gradient.addColorStop(0.2, "#ffd166");
        gradient.addColorStop(0.4, "#a8ff68");
        gradient.addColorStop(0.62, "#35eaff");
        gradient.addColorStop(0.82, "#704eff");
        gradient.addColorStop(1, "#ff3ebf");
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.arc(0, 0, enemy.r, 0, TAU);
        ctx.fill();

        ctx.lineWidth = 3;
        ctx.strokeStyle = "rgba(255, 255, 255, 0.86)";
        ctx.beginPath();
        ctx.arc(0, 0, enemy.r + 4, 0, TAU);
        ctx.stroke();

        ctx.lineWidth = 2;
        ctx.strokeStyle = "rgba(255, 255, 255, 0.48)";
        ctx.beginPath();
        ctx.arc(0, 0, enemy.r * 0.55, 0, TAU);
        ctx.stroke();
        ctx.restore();
        return;
      }

      ctx.shadowBlur = enemy.type === "armored" ? 30 : 24;
      ctx.shadowColor = `hsl(${enemy.hue} 100% 62%)`;

      const gradient = ctx.createRadialGradient(-enemy.r * 0.35, -enemy.r * 0.35, enemy.r * 0.1, 0, 0, enemy.r);
      gradient.addColorStop(0, `hsl(${enemy.hue} 100% 82%)`);
      gradient.addColorStop(0.48, `hsl(${enemy.hue} 100% 54%)`);
      gradient.addColorStop(1, `hsl(${enemy.hue} 78% 24%)`);
      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.arc(0, 0, enemy.r, 0, TAU);
      ctx.fill();

      if (enemy.hitFlash > 0) {
        ctx.globalAlpha = enemy.hitFlash / 0.18;
        ctx.fillStyle = "rgba(255, 255, 255, 0.55)";
        ctx.beginPath();
        ctx.arc(0, 0, enemy.r, 0, TAU);
        ctx.fill();
        ctx.globalAlpha = 1;
      }

      ctx.lineWidth = 2;
      ctx.strokeStyle = "rgba(255, 255, 255, 0.58)";
      ctx.beginPath();
      ctx.arc(0, 0, enemy.r * 0.72, 0.16, Math.PI * 1.15);
      ctx.stroke();

      ctx.strokeStyle = `hsla(${enemy.hue} 100% 76% / 0.55)`;
      ctx.beginPath();
      ctx.moveTo(-enemy.r * 0.86, 0);
      ctx.lineTo(enemy.r * 0.86, 0);
      ctx.moveTo(0, -enemy.r * 0.86);
      ctx.lineTo(0, enemy.r * 0.86);
      ctx.stroke();

      if (enemy.type === "hunt" && enemy.colorId === state.huntTargetId) {
        ctx.lineWidth = 4;
        ctx.strokeStyle = "rgba(255, 255, 255, 0.9)";
        ctx.shadowBlur = 18;
        ctx.shadowColor = `hsl(${enemy.hue} 100% 68%)`;
        ctx.beginPath();
        ctx.arc(0, 0, enemy.r + 6, 0, TAU);
        ctx.stroke();
      }

      if (enemy.type === "armored") {
        ctx.lineWidth = 4;
        ctx.strokeStyle = "rgba(236, 255, 233, 0.82)";
        ctx.beginPath();
        ctx.arc(0, 0, enemy.r + 5, 0, TAU);
        ctx.stroke();

        ctx.lineWidth = 2;
        ctx.strokeStyle = `hsla(${enemy.hue} 100% 76% / 0.92)`;
        ctx.beginPath();
        ctx.arc(0, 0, enemy.r + 10, 0, TAU);
        ctx.stroke();

        for (let i = 0; i < enemy.maxHealth; i++) {
          ctx.fillStyle = i < enemy.health ? "#ffffff" : "rgba(255, 255, 255, 0.24)";
          ctx.beginPath();
          ctx.arc((i - 0.5) * 10, -enemy.r - 17, 3.2, 0, TAU);
          ctx.fill();
        }
      }
      ctx.restore();
    }

    function drawPlayer() {
      const player = state.player;
      const color = getPlayerColor();
      ctx.save();
      const invulnerableBlink = state.invulnerableTimer > 0 && Math.floor(performance.now() / 90) % 2 === 0;
      ctx.globalAlpha = invulnerableBlink ? 0.42 : 1;
      for (let i = player.trail.length - 1; i >= 0; i--) {
        const dot = player.trail[i];
        const alpha = dot.life / 0.45;
        drawTrailStyle(ctx, state.selectedTrail, dot.x, dot.y, dot.r * (0.55 + alpha * 0.45), alpha * 0.34 * (invulnerableBlink ? 0.42 : 1), i, performance.now());
      }
      ctx.globalAlpha = 1;
      ctx.shadowBlur = 32;
      ctx.shadowColor = color.glow;
      ctx.fillStyle = color.core;

      const now = performance.now();
      if (hasActiveItem("strength")) {
        const pulse = 0.5 + Math.sin(now * 0.026) * 0.5;
        ctx.save();
        ctx.globalAlpha = 0.28 + pulse * 0.18;
        ctx.shadowBlur = 34;
        ctx.shadowColor = "rgba(255, 58, 64, 0.95)";
        ctx.fillStyle = "rgba(255, 58, 64, 0.24)";
        ctx.beginPath();
        ctx.arc(player.x, player.y, player.r + 13 + pulse * 6, 0, TAU);
        ctx.fill();
        ctx.restore();
      }

      if (hasActiveItem("shield")) {
        const pulse = 0.5 + Math.sin(now * 0.014) * 0.5;
        const bubbleRadius = player.r + 18 + pulse * 2.5;
        ctx.save();
        ctx.globalAlpha = 0.26;
        ctx.fillStyle = "rgba(91, 196, 255, 0.16)";
        ctx.strokeStyle = "rgba(216, 251, 255, 0.82)";
        ctx.lineWidth = 2.2;
        ctx.shadowBlur = 24;
        ctx.shadowColor = "rgba(53, 234, 255, 0.72)";
        ctx.beginPath();
        ctx.arc(player.x, player.y, bubbleRadius, 0, TAU);
        ctx.fill();
        ctx.stroke();
        ctx.globalAlpha = 0.34;
        ctx.beginPath();
        ctx.arc(player.x - bubbleRadius * 0.22, player.y - bubbleRadius * 0.24, bubbleRadius * 0.23, Math.PI * 1.05, Math.PI * 1.55);
        ctx.stroke();
        ctx.restore();
      }

      ctx.save();
      ctx.translate(player.x, player.y);
      drawPlayerShape(state.selectedShape, player.r, now);
      ctx.fill();
      ctx.lineWidth = 3;
      ctx.strokeStyle = hasActiveItem("strength") ? "#ff3a40" : color.glow;
      ctx.stroke();
      drawPlayerShapeDetails(state.selectedShape, player.r, now, color);
      ctx.restore();

      ctx.shadowBlur = 12;
      ctx.shadowColor = color.glow;
      ctx.strokeStyle = color.glow;
      ctx.beginPath();
      ctx.arc(player.x, player.y, player.r + 7, 0, TAU);
      ctx.stroke();

      if (state.shotCooldown > 0) {
        const ready = 1 - clamp(state.shotCooldown / state.shotCooldownMax, 0, 1);
        ctx.lineWidth = 4;
        ctx.strokeStyle = "rgba(255, 209, 102, 0.92)";
        ctx.beginPath();
        ctx.arc(player.x, player.y, player.r + 13, -Math.PI / 2, -Math.PI / 2 + TAU * ready);
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawPointerAim() {
      if (!pointer.down) return;
      const player = state.player;
      const dx = pointer.x - player.x;
      const dy = pointer.y - player.y;
      const distance = hypot(dx, dy);
      const pulse = 0.5 + Math.sin(performance.now() / 90) * 0.5;

      ctx.save();
      ctx.lineCap = "round";
      ctx.lineWidth = 3;
      ctx.setLineDash([10, 12]);
      ctx.strokeStyle = `rgba(168, 255, 104, ${0.45 + pulse * 0.28})`;
      ctx.shadowBlur = 18;
      ctx.shadowColor = "#a8ff68";
      ctx.beginPath();
      ctx.moveTo(player.x, player.y);
      ctx.lineTo(pointer.x, pointer.y);
      ctx.stroke();
      ctx.setLineDash([]);

      ctx.globalAlpha = 0.88;
      ctx.fillStyle = "rgba(168, 255, 104, 0.16)";
      ctx.strokeStyle = "rgba(168, 255, 104, 0.78)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(pointer.x, pointer.y, clamp(distance * 0.08, 16, 46), 0, TAU);
      ctx.fill();
      ctx.stroke();
      ctx.restore();
    }

    function drawEffects() {
      ctx.save();
      for (const wave of state.waves) {
        const alpha = wave.life / wave.maxLife;
        ctx.globalAlpha = alpha;
        ctx.lineWidth = 3;
        ctx.strokeStyle = `hsla(${wave.hue} 100% 68% / ${alpha})`;
        ctx.shadowBlur = 18;
        ctx.shadowColor = `hsl(${wave.hue} 100% 64%)`;
        ctx.beginPath();
        ctx.arc(wave.x, wave.y, wave.radius, 0, TAU);
        ctx.stroke();
      }

      for (const spark of state.sparks) {
        const alpha = spark.life / spark.maxLife;
        ctx.globalAlpha = alpha;
        ctx.fillStyle = `hsl(${spark.hue} 100% 68%)`;
        ctx.shadowBlur = 14;
        ctx.shadowColor = `hsl(${spark.hue} 100% 68%)`;
        ctx.beginPath();
        ctx.arc(spark.x, spark.y, spark.r * alpha, 0, TAU);
        ctx.fill();
      }
      ctx.restore();
    }

    function drawCollectibles(time) {
      ctx.save();
      for (const star of state.collectibles) {
        const fade = clamp(star.life / star.maxLife, 0, 1);
        const pulse = 0.5 + Math.sin(time * 0.012 + star.x) * 0.5;
        ctx.save();
        ctx.translate(star.x, star.y);
        ctx.rotate(star.angle);
        ctx.globalAlpha = Math.min(1, fade * 1.4);
        ctx.shadowBlur = 20 + pulse * 10;
        ctx.shadowColor = "rgba(255, 209, 102, 0.95)";
        ctx.fillStyle = "#ffd166";
        ctx.strokeStyle = "rgba(255, 250, 210, 0.84)";
        ctx.lineWidth = 1.8;
        ctx.beginPath();
        for (let i = 0; i < 10; i++) {
          const radius = i % 2 === 0 ? star.r : star.r * 0.45;
          const angle = -Math.PI / 2 + (i / 10) * TAU;
          const x = Math.cos(angle) * radius;
          const y = Math.sin(angle) * radius;
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.fill();
        ctx.stroke();

        ctx.globalAlpha = Math.min(0.34, fade * 0.34);
        ctx.beginPath();
        ctx.arc(0, 0, star.r + 8 + pulse * 3, 0, TAU);
        ctx.fill();
        ctx.restore();
      }
      ctx.restore();
    }

    function drawItemPickups(time) {
      if (!state.itemPickups.length) return;
      ctx.save();
      for (const item of state.itemPickups) {
        const type = itemTypes[item.type];
        const fade = clamp(item.life / item.maxLife, 0, 1);
        const pulse = 0.5 + Math.sin(time * 0.015 + item.x) * 0.5;
        ctx.save();
        ctx.translate(item.x, item.y);
        ctx.rotate(item.angle);
        const hue = type.hue;
        ctx.globalAlpha = Math.min(1, fade * 1.35);
        ctx.shadowBlur = 22 + pulse * 12;
        ctx.shadowColor = `hsla(${hue}, 100%, 64%, 0.95)`;
        ctx.fillStyle = `hsla(${hue}, 100%, 58%, 0.22)`;
        ctx.strokeStyle = `hsla(${hue}, 100%, 78%, 0.92)`;
        ctx.lineWidth = 2;
        ctx.beginPath();
        if (item.type === "shield") {
          ctx.arc(0, 0, item.r * 1.1, 0, TAU);
        } else if (item.type === "strength") {
          for (let i = 0; i < 8; i++) {
            const angle = (i / 8) * TAU;
            const radius = i % 2 === 0 ? item.r * 1.22 : item.r * 0.68;
            const x = Math.cos(angle) * radius;
            const y = Math.sin(angle) * radius;
            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
          }
          ctx.closePath();
        } else if (item.type === "slowMo") {
          ctx.ellipse(0, 0, item.r * 1.18, item.r * 0.78, 0, 0, TAU);
        } else {
          ctx.roundRect(-item.r, -item.r, item.r * 2, item.r * 2, 7);
        }
        ctx.fill();
        ctx.stroke();

        if (item.type === "shield") {
          ctx.globalAlpha = 0.55;
          ctx.beginPath();
          ctx.arc(0, 0, item.r * 1.55 + pulse * 3, 0, TAU);
          ctx.stroke();
        } else if (item.type === "slowMo") {
          ctx.globalAlpha = 0.44;
          ctx.setLineDash([4, 5]);
          ctx.beginPath();
          ctx.arc(0, 0, item.r * 1.45 + pulse * 4, 0, TAU);
          ctx.stroke();
          ctx.setLineDash([]);
        }

        ctx.rotate(-item.angle);
        ctx.globalAlpha = Math.min(1, fade * 1.35);
        ctx.fillStyle = "#d8fbff";
        ctx.font = `900 ${item.r * 1.35}px system-ui, sans-serif`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(type.icon, 0, -1);

        ctx.globalAlpha = Math.min(0.28, fade * 0.28);
        ctx.beginPath();
        ctx.arc(0, 0, item.r + 9 + pulse * 4, 0, TAU);
        ctx.fill();
        ctx.restore();
      }
      ctx.restore();
    }

    function render(time) {
      ctx.setTransform(state.dpr, 0, 0, state.dpr, 0, 0);
      ctx.clearRect(0, 0, state.viewWidth, state.viewHeight);
      if (state.screen === "skinsScreen") {
        renderShapePreviews();
      }
      ctx.save();
      ctx.scale(state.renderScale, state.renderScale);
      if (state.shake > 0) {
        ctx.translate(rand(-state.shake, state.shake), rand(-state.shake, state.shake));
      }
      drawGrid(time);
      drawStars();
      if (state.screen === "game") {
        drawMeteorWarnings(time);
        drawChaosLasers(time);
        drawChaosMines(time);
        drawChaosStarPairs(time);
      }
      drawCollectibles(time);
      drawItemPickups(time);
      drawEffects();
      for (const enemy of state.enemies) {
        drawEnemy(enemy);
      }
      if (state.screen === "game" && !state.deathSequence) {
        drawPlayer();
        drawPointerAim();
      }
      ctx.restore();
    }

    function loop(time) {
      if (!state.running) {
        render(time);
        state.loopActive = false;
        return;
      }
      const rawDt = Math.min(0.033, (time - state.lastTime) / 1000 || 0);
      state.lastTime = time;

      if (state.paused) {
        render(time);
        requestAnimationFrame(loop);
        return;
      }

      let timeScale = 1;
      if (state.deathSequence) {
        timeScale = 0.16;
      } else if (state.resumeSlowMo > 0) {
        const progress = 1 - state.resumeSlowMo / state.resumeSlowMoMax;
        timeScale = 0.18 + progress * progress * 0.82;
        state.resumeSlowMo = Math.max(0, state.resumeSlowMo - rawDt);
      }
      if (isSlowMoHoldActive(time)) {
        timeScale = Math.min(timeScale, 0.34);
      }

      const dt = rawDt * timeScale;
      if (state.deathSequence) {
        state.deathTimer -= rawDt;
        updateEnemyMotion(dt);
        updateEffects(dt, rawDt);
        render(time);
        if (state.deathTimer <= 0) {
          endGame();
          render(time);
          state.loopActive = false;
          return;
        }
        requestAnimationFrame(loop);
        return;
      }

      updatePlayer(dt);
      updateCollectibles(dt);
      updateEnemies(dt);
      updateEffects(dt, rawDt);
      render(time);
      requestAnimationFrame(loop);
    }

    syncViewportSize();
    resize();
    applyVolumeSettings();
    updateHud();
    render(0);
    bootAccount();
  </script>
</body>
</html>
