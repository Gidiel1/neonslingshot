<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content">
  <title>Neon Slingshot</title>
  <style>
    :root {
      color-scheme: dark;
      --app-width: 100vw;
      --app-height: 100vh;
      --browser-safe-top: 0px;
      --browser-safe-bottom: 0px;
      --bg: #080910;
      --panel: rgba(10, 13, 24, 0.72);
      --text: #f4fbff;
      --muted: #97a5b8;
      --cyan: #35eaff;
      --lime: #a8ff68;
      --pink: #ff3ebf;
      --amber: #ffd166;
      --red: #ff4d6d;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      user-select: none;
      touch-action: none;
    }

    body {
      display: grid;
      place-items: center;
    }

    .game-shell {
      position: fixed;
      top: var(--browser-safe-top);
      left: 0;
      width: var(--app-width);
      height: calc(var(--app-height) - var(--browser-safe-top) - var(--browser-safe-bottom));
      overflow: hidden;
      container-type: size;
      background:
        radial-gradient(circle at 22% 18%, rgba(53, 234, 255, 0.12), transparent 24%),
        radial-gradient(circle at 82% 76%, rgba(255, 62, 191, 0.10), transparent 28%),
        linear-gradient(135deg, #080910, #0b1020 52%, #05070d);
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
      cursor: crosshair;
      background:
        radial-gradient(circle at 22% 18%, rgba(53, 234, 255, 0.12), transparent 24%),
        radial-gradient(circle at 82% 76%, rgba(255, 62, 191, 0.10), transparent 28%),
        linear-gradient(135deg, #080910, #0b1020 52%, #05070d);
    }

    .hud {
      position: absolute;
      top: 16px;
      left: 16px;
      right: 16px;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: start;
      gap: 12px;
      pointer-events: none;
      z-index: 3;
    }

    .hud[hidden],
    .hud-stat[hidden],
    .hunt-target-badge[hidden],
    .item-hud[hidden],
    .screen[hidden],
    .pause-button[hidden],
    .pause-overlay[hidden],
    .shop-dialog[hidden],
    .settings-dialog[hidden],
    .mode-info-dialog[hidden] {
      display: none;
    }

    .hud-stat {
      display: grid;
      gap: 3px;
      font-weight: 950;
      line-height: 1;
      text-transform: uppercase;
      text-shadow: 0 0 14px rgba(0, 0, 0, 0.92), 0 0 18px rgba(53, 234, 255, 0.34);
    }

    .hud-label {
      color: rgba(244, 251, 255, 0.68);
      font-size: clamp(0.62rem, 3.2cqw, 0.78rem);
    }

    .hud-value {
      font-size: clamp(1.18rem, 7cqw, 1.9rem);
      font-variant-numeric: tabular-nums;
    }

    .hud.chaos-mode {
      grid-template-columns: 1fr;
    }

    .hud.chaos-mode .hud-stat:first-child {
      justify-self: start;
    }

    .hud.chaos-mode .hud-stat:first-child .hud-label {
      color: rgba(255, 209, 102, 0.78);
    }

    .hud.chaos-mode .hud-stat:first-child .hud-value {
      color: var(--amber);
      font-size: clamp(1.65rem, 9cqw, 2.6rem);
      text-shadow: 0 0 18px rgba(255, 209, 102, 0.9), 0 0 12px rgba(0, 0, 0, 0.95);
    }

    .hud-value.hot {
      color: var(--amber);
      text-shadow: 0 0 16px rgba(255, 209, 102, 0.9), 0 0 12px rgba(0, 0, 0, 0.9);
    }

    .hunt-target-badge {
      position: absolute;
      top: 66px;
      right: 16px;
      z-index: 3;
      width: auto;
      max-width: 180px;
      display: grid;
      justify-items: end;
      gap: 3px;
      padding: 0;
      border: 0;
      border-radius: 0;
      background: transparent;
      box-shadow: none;
      pointer-events: none;
      text-align: right;
    }

    .hunt-target-badge .hud-label {
      font-size: clamp(0.56rem, 2.8cqw, 0.72rem);
      font-style: italic;
      letter-spacing: 0.12em;
      color: rgba(244, 251, 255, 0.68);
      text-shadow: 0 0 12px rgba(0, 0, 0, 0.9);
    }

    #huntTarget {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      max-width: 100%;
      color: var(--hunt-color, var(--cyan));
      font-family: Impact, Haettenschweiler, "Arial Black", system-ui, sans-serif;
      font-size: clamp(1.45rem, 7.3cqw, 2.05rem);
      font-style: italic;
      letter-spacing: 0.04em;
      line-height: 0.95;
      white-space: nowrap;
      text-shadow: 0 0 18px var(--hunt-glow, rgba(53, 234, 255, 0.82)), 0 0 12px rgba(0, 0, 0, 0.95);
    }

    #huntTarget::before {
      content: "";
      width: 0.78em;
      height: 0.78em;
      flex: 0 0 auto;
      border-radius: 999px;
      background: var(--hunt-color, var(--cyan));
      box-shadow: 0 0 14px var(--hunt-glow, rgba(53, 234, 255, 0.82));
    }

    .run-stars {
      margin-top: -1px;
      color: var(--amber);
      font-weight: 900;
      font-size: clamp(0.72rem, 3.4cqw, 0.9rem);
      text-shadow: 0 0 12px rgba(255, 209, 102, 0.72), 0 0 10px rgba(0, 0, 0, 0.9);
    }

    .combo-progress {
      display: block;
      width: clamp(54px, 18cqw, 82px);
      height: 4px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(244, 251, 255, 0.16);
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.68);
    }

    .combo-progress-fill {
      display: block;
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--cyan), var(--lime), var(--amber));
      box-shadow: 0 0 12px rgba(255, 209, 102, 0.72);
    }

    .hearts {
      position: absolute;
      top: 2px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 5px;
      justify-content: center;
      font-size: clamp(1.3rem, 7.4cqw, 2rem);
      line-height: 1;
      text-shadow: 0 0 12px rgba(0, 0, 0, 0.92), 0 0 18px rgba(255, 77, 109, 0.7);
    }

    .heart {
      color: var(--red);
    }

    .heart.empty {
      color: rgba(244, 251, 255, 0.22);
      text-shadow: 0 0 10px rgba(0, 0, 0, 0.8);
    }

    .screen {
      position: absolute;
      inset: 0;
      z-index: 4;
      display: grid;
      align-content: start;
      padding: clamp(18px, 5cqw, 26px);
      pointer-events: auto;
      background:
        linear-gradient(180deg, rgba(5, 8, 16, 0.28), rgba(5, 8, 16, 0.18) 46%, rgba(5, 8, 16, 0.38)),
        radial-gradient(circle at 50% 34%, rgba(53, 234, 255, 0.12), transparent 42%);
    }

    .menu-title {
      margin: 10px 0 0;
      font-size: clamp(2.25rem, 15cqw, 4.6rem);
      line-height: 0.86;
      letter-spacing: 0;
      text-transform: uppercase;
      text-shadow: 0 0 24px rgba(53, 234, 255, 0.72);
    }

    .username {
      margin-top: 14px;
      color: rgba(244, 251, 255, 0.82);
      font-weight: 800;
      font-size: clamp(0.9rem, 4cqw, 1.05rem);
      text-transform: uppercase;
    }

    .currency-pill {
      width: max-content;
      margin-top: 10px;
      padding: 7px 10px;
      border: 1px solid rgba(255, 209, 102, 0.28);
      border-radius: 8px;
      background: rgba(255, 209, 102, 0.08);
      color: var(--amber);
      font-weight: 950;
      font-size: clamp(0.9rem, 4.2cqw, 1.08rem);
      text-shadow: 0 0 14px rgba(255, 209, 102, 0.68);
    }

    .menu-actions {
      display: grid;
      gap: 12px;
      margin-top: clamp(48px, 16cqh, 148px);
    }

    .menu-actions button {
      position: relative;
    }

    .settings-button {
      position: absolute;
      top: clamp(18px, 5cqw, 26px);
      right: clamp(18px, 5cqw, 26px);
      z-index: 2;
      width: 42px;
      height: 42px;
      padding: 0;
      border-radius: 8px;
      background: rgba(244, 251, 255, 0.08);
      color: var(--text);
      font-size: 1.18rem;
      box-shadow: 0 0 16px rgba(53, 234, 255, 0.1);
    }

    .challenge-alert {
      position: absolute;
      top: 50%;
      right: 14px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 35% 30%, rgba(255, 255, 255, 0.9), transparent 18%),
        radial-gradient(circle at 66% 70%, rgba(0, 38, 96, 0.85), transparent 24%),
        #35eaff;
      box-shadow: 0 0 14px rgba(53, 234, 255, 0.86), 0 0 0 2px rgba(53, 234, 255, 0.18);
      transform: translateY(-50%);
      animation: alert-planet 1.05s ease-in-out infinite;
      pointer-events: none;
    }

    .challenge-alert[hidden] {
      display: none;
    }

    @keyframes alert-planet {
      0%, 100% {
        transform: translateY(-50%) scale(0.92);
      }
      50% {
        transform: translateY(-50%) scale(1.12);
      }
    }

    .screen-panel {
      margin-top: clamp(86px, 20cqh, 180px);
      display: grid;
      gap: 14px;
    }

    .mode-list {
      display: grid;
      gap: 12px;
      margin-top: 24px;
    }

    .special-modes-screen {
      overflow-y: auto;
      padding-bottom: 34px;
      touch-action: pan-y;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
    }

    .special-modes-screen .screen-panel {
      margin-top: 16px;
    }

    .mode-panel {
      --mode-hue: 188;
      position: relative;
      overflow: hidden;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto;
      align-items: center;
      gap: 9px;
      min-height: 78px;
      padding: 14px 12px 14px 15px;
      border: 1px solid hsla(var(--mode-hue), 100%, 72%, 0.28);
      border-radius: 8px;
      background:
        linear-gradient(135deg, hsla(var(--mode-hue), 100%, 56%, 0.15), rgba(244, 251, 255, 0.035) 54%, rgba(6, 9, 18, 0.68)),
        rgba(244, 251, 255, 0.045);
      box-shadow:
        inset 4px 0 0 hsla(var(--mode-hue), 100%, 62%, 0.76),
        0 0 24px hsla(var(--mode-hue), 100%, 52%, 0.09);
      isolation: isolate;
    }

    .mode-panel::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.055), transparent);
      opacity: 0.42;
      pointer-events: none;
      z-index: -1;
    }

    .mode-name {
      color: var(--text);
      font-weight: 950;
      font-size: clamp(1.08rem, 5.4cqw, 1.38rem);
      text-transform: uppercase;
      text-shadow: 0 0 14px hsla(var(--mode-hue), 100%, 62%, 0.52);
    }

    .mode-best {
      margin-top: 4px;
      color: hsla(var(--mode-hue), 100%, 82%, 0.86);
      font-weight: 900;
      font-size: clamp(0.72rem, 3.3cqw, 0.88rem);
      text-transform: uppercase;
    }

    .mode-info,
    .mode-play {
      width: 44px;
      height: 44px;
      padding: 0;
      line-height: 1;
    }

    .mode-info {
      border-color: hsla(var(--mode-hue), 100%, 76%, 0.26);
      background: rgba(244, 251, 255, 0.07);
      color: rgba(244, 251, 255, 0.9);
      font-family: Arial, Helvetica, sans-serif;
      font-size: 1.15rem;
      font-weight: 950;
      text-transform: none;
      box-shadow: 0 0 14px hsla(var(--mode-hue), 100%, 56%, 0.08);
    }

    .mode-info-dialog {
      position: absolute;
      inset: 0;
      z-index: 12;
      display: grid;
      place-items: center;
      padding: 22px;
      background: rgba(2, 4, 10, 0.62);
      backdrop-filter: blur(8px);
    }

    .mode-info-panel {
      width: min(100%, 340px);
      padding: 18px;
      border: 1px solid rgba(53, 234, 255, 0.24);
      border-radius: 8px;
      background:
        linear-gradient(145deg, rgba(53, 234, 255, 0.13), rgba(255, 62, 191, 0.08)),
        rgba(5, 8, 16, 0.92);
      box-shadow: 0 0 34px rgba(53, 234, 255, 0.16);
    }

    .mode-info-title {
      margin: 0;
      color: var(--text);
      font-weight: 950;
      font-size: clamp(1.2rem, 6cqw, 1.55rem);
      text-transform: uppercase;
      text-shadow: 0 0 18px rgba(53, 234, 255, 0.5);
    }

    .mode-info-text {
      margin: 10px 0 16px;
      color: rgba(244, 251, 255, 0.76);
      font-weight: 750;
      font-size: clamp(0.82rem, 3.7cqw, 0.98rem);
      line-height: 1.42;
    }

    .challenge-list {
      display: grid;
      gap: 12px;
      margin-top: 22px;
    }

    .challenge-group {
      display: grid;
      gap: 10px;
    }

    .challenge-section-heading {
      margin: 14px 0 0;
      padding: 0 2px;
      color: rgba(244, 251, 255, 0.7);
      font-weight: 950;
      font-size: clamp(0.72rem, 3.4cqw, 0.9rem);
      text-transform: uppercase;
      text-shadow: 0 0 12px rgba(0, 0, 0, 0.82);
    }

    .challenge-screen {
      overflow-y: auto;
      padding-bottom: 34px;
    }

    .challenge-screen .screen-panel {
      margin-top: 18px;
    }

    .challenge-panel {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 12px;
      min-height: 126px;
      padding: 12px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      background:
        linear-gradient(135deg, rgba(53, 234, 255, 0.055), rgba(255, 209, 102, 0.025)),
        rgba(244, 251, 255, 0.045);
    }

    .challenge-panel.ready {
      border-color: rgba(255, 209, 102, 0.42);
      background: rgba(255, 209, 102, 0.08);
      box-shadow: 0 0 18px rgba(255, 209, 102, 0.11);
    }

    .challenge-panel.claimed {
      opacity: 0.62;
      filter: saturate(0.72);
    }

    .challenge-panel.claim-pop {
      animation: claim-pop 0.52s ease-out;
    }

    @keyframes claim-pop {
      0% {
        transform: scale(1);
        box-shadow: 0 0 0 rgba(255, 209, 102, 0);
      }
      42% {
        transform: scale(1.025);
        box-shadow: 0 0 34px rgba(255, 209, 102, 0.42);
      }
      100% {
        transform: scale(1);
      }
    }

    .challenge-name {
      color: var(--text);
      font-weight: 950;
      font-size: clamp(0.95rem, 4.4cqw, 1.16rem);
      text-transform: uppercase;
      text-shadow: 0 0 14px rgba(53, 234, 255, 0.34);
    }

    .challenge-copy {
      margin-top: 5px;
      color: rgba(244, 251, 255, 0.66);
      font-weight: 800;
      font-size: clamp(0.68rem, 3.1cqw, 0.82rem);
      line-height: 1.25;
      min-height: 2.5em;
    }

    .challenge-progress {
      margin-top: 8px;
      color: rgba(255, 209, 102, 0.82);
      font-weight: 950;
      font-size: clamp(0.66rem, 3cqw, 0.78rem);
      text-transform: uppercase;
    }

    .challenge-reward {
      width: 76px;
      min-height: 96px;
      display: grid;
      justify-items: center;
      align-content: center;
      gap: 7px;
      color: var(--amber);
      font-weight: 950;
      text-shadow: 0 0 14px rgba(255, 209, 102, 0.65);
    }

    .challenge-stars {
      font-size: clamp(1.05rem, 5cqw, 1.4rem);
      white-space: nowrap;
    }

    .challenge-color-preview {
      width: 54px;
      height: 34px;
      border: 2px solid rgba(255, 255, 255, 0.26);
      border-radius: 8px;
      background: var(--swatch);
      box-shadow: 0 0 14px color-mix(in srgb, var(--swatch) 42%, transparent);
    }

    .challenge-shape-preview {
      width: 54px;
      height: 54px;
      display: block;
      border-radius: 14px;
      -webkit-mask-image: radial-gradient(circle, #000 0 56%, rgba(0, 0, 0, 0.72) 70%, transparent 84%);
      mask-image: radial-gradient(circle, #000 0 56%, rgba(0, 0, 0, 0.72) 70%, transparent 84%);
    }

    .challenge-claim {
      width: 42px;
      height: 34px;
      padding: 0;
      font-size: 0.8rem;
      box-shadow: 0 0 16px rgba(255, 209, 102, 0.2);
    }

    .mode-play {
      font-size: 1rem;
    }

    .shop-done-panel {
      margin-top: 18px;
    }

    .shop-balance {
      width: max-content;
      margin-top: 10px;
      color: var(--amber);
      font-weight: 950;
      font-size: clamp(0.95rem, 4.3cqw, 1.12rem);
      text-shadow: 0 0 14px rgba(255, 209, 102, 0.7);
    }

    .skin-combo-preview {
      position: relative;
      height: clamp(136px, 34cqh, 176px);
      margin-top: 14px;
      overflow: hidden;
      border: 1px solid rgba(53, 234, 255, 0.16);
      border-radius: 8px;
      background:
        radial-gradient(circle at 58% 44%, rgba(53, 234, 255, 0.1), transparent 36%),
        linear-gradient(135deg, rgba(244, 251, 255, 0.035), rgba(6, 9, 18, 0.34));
      box-shadow: inset 0 0 24px rgba(53, 234, 255, 0.05);
    }

    .skin-combo-preview canvas {
      width: 100%;
      height: 100%;
      display: block;
      background: transparent;
    }

    .skin-combo-label {
      position: absolute;
      left: 12px;
      top: 10px;
      color: rgba(244, 251, 255, 0.6);
      font-size: clamp(0.66rem, 3cqw, 0.78rem);
      font-weight: 950;
      text-transform: uppercase;
      pointer-events: none;
      text-shadow: 0 0 10px rgba(0, 0, 0, 0.82);
    }

    .shop-section {
      margin-top: 22px;
      display: grid;
      gap: 10px;
    }

    .shop-section-title {
      color: rgba(244, 251, 255, 0.72);
      font-weight: 950;
      font-size: clamp(0.74rem, 3.3cqw, 0.92rem);
      text-transform: uppercase;
      text-shadow: 0 0 12px rgba(0, 0, 0, 0.82);
    }

    .color-grid {
      display: flex;
      gap: 12px;
      margin: 0 -10px;
      padding: 12px 10px 16px;
      overflow-x: auto;
      overflow-y: visible;
      overscroll-behavior-x: contain;
      scrollbar-width: thin;
      scrollbar-color: rgba(255, 209, 102, 0.48) rgba(244, 251, 255, 0.08);
      scroll-snap-type: x proximity;
    }

    .color-grid::-webkit-scrollbar {
      height: 6px;
    }

    .color-grid::-webkit-scrollbar-track {
      background: rgba(244, 251, 255, 0.08);
      border-radius: 999px;
    }

    .color-grid::-webkit-scrollbar-thumb {
      background: rgba(255, 209, 102, 0.5);
      border-radius: 999px;
    }

    .color-swatch {
      position: relative;
      flex: 0 0 clamp(54px, 16cqw, 68px);
      height: clamp(44px, 13cqw, 54px);
      padding: 0;
      border-radius: 8px;
      scroll-snap-align: start;
      border: 2px solid rgba(255, 255, 255, 0.16);
      background: var(--swatch);
      box-shadow: 0 0 8px color-mix(in srgb, var(--swatch) 36%, transparent);
    }

    .color-swatch.selected {
      border-color: rgba(255, 255, 255, 0.94);
      box-shadow: 0 0 0 2px rgba(255, 209, 102, 0.42), 0 0 12px color-mix(in srgb, var(--swatch) 42%, transparent);
    }

    .color-swatch.locked {
      filter: saturate(0.55) brightness(0.8);
      box-shadow: none;
    }

    .color-swatch.locked::after {
      content: "🔒";
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      border-radius: 6px;
      background: rgba(5, 8, 16, 0.62);
      color: var(--text);
      font-size: clamp(1rem, 5.2cqw, 1.45rem);
      text-shadow: 0 0 12px rgba(0, 0, 0, 0.95);
    }

    .color-swatch.special-color,
    .challenge-color-preview.special-color {
      background: conic-gradient(from 0deg, #ff3ebf, #35eaff, #a8ff68, #ffd166, #ff3ebf);
      animation: chroma-flow 2.8s linear infinite;
    }

    @keyframes chroma-flow {
      to {
        filter: hue-rotate(360deg);
      }
    }

    .shop-screen {
      overflow-y: auto;
      padding-bottom: 92px;
    }

    .skin-back-button {
      position: absolute;
      top: clamp(18px, 5cqw, 26px);
      right: clamp(18px, 5cqw, 26px);
      z-index: 2;
      width: 42px;
      height: 42px;
      padding: 0;
      border-radius: 8px;
      background: rgba(244, 251, 255, 0.08);
      color: var(--text);
      font-size: 1.2rem;
      box-shadow: 0 0 16px rgba(53, 234, 255, 0.1);
    }

    .skin-slot-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .skin-slot {
      min-height: 82px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      background: rgba(244, 251, 255, 0.025);
      display: grid;
      place-items: center;
      gap: 7px;
      padding: 10px 6px;
      color: rgba(244, 251, 255, 0.5);
      font-weight: 950;
      font-size: clamp(0.68rem, 3.1cqw, 0.82rem);
      text-transform: uppercase;
      text-shadow: 0 0 12px rgba(0, 0, 0, 0.72);
    }

    .skin-slot.selected {
      border-color: rgba(255, 209, 102, 0.64);
      background: rgba(255, 209, 102, 0.08);
      color: var(--text);
    }

    .skin-slot.locked {
      position: relative;
      filter: saturate(0.5) brightness(0.75);
    }

    .skin-slot.locked::after {
      content: "🔒";
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: rgba(5, 8, 16, 0.56);
      color: var(--text);
      font-size: clamp(1.1rem, 5.4cqw, 1.5rem);
      text-shadow: 0 0 12px rgba(0, 0, 0, 0.95);
    }

    .shape-preview {
      width: 56px;
      height: 56px;
      display: block;
      border-radius: 14px;
      -webkit-mask-image: radial-gradient(circle, #000 0 54%, rgba(0, 0, 0, 0.72) 68%, transparent 82%);
      mask-image: radial-gradient(circle, #000 0 54%, rgba(0, 0, 0, 0.72) 68%, transparent 82%);
    }

    .trail-preview {
      width: 62px;
      height: 44px;
      display: block;
      border-radius: 14px;
      -webkit-mask-image: radial-gradient(ellipse, #000 0 55%, rgba(0, 0, 0, 0.7) 70%, transparent 86%);
      mask-image: radial-gradient(ellipse, #000 0 55%, rgba(0, 0, 0, 0.7) 70%, transparent 86%);
    }

    .shop-dialog {
      position: absolute;
      inset: 0;
      z-index: 8;
      display: grid;
      place-items: center;
      padding: 24px;
      background: rgba(5, 8, 16, 0.5);
      backdrop-filter: blur(5px);
    }

    .settings-dialog {
      position: absolute;
      inset: 0;
      z-index: 13;
      display: grid;
      place-items: center;
      padding: 22px;
      background: rgba(2, 4, 10, 0.62);
      backdrop-filter: blur(8px);
    }

    .settings-panel {
      width: min(100%, 340px);
      display: grid;
      gap: 16px;
      padding: 18px;
      border: 1px solid rgba(53, 234, 255, 0.24);
      border-radius: 8px;
      background:
        linear-gradient(145deg, rgba(53, 234, 255, 0.13), rgba(255, 62, 191, 0.08)),
        rgba(5, 8, 16, 0.94);
      box-shadow: 0 0 34px rgba(53, 234, 255, 0.16);
    }

    .settings-title {
      margin: 0;
      color: var(--text);
      font-weight: 950;
      font-size: clamp(1.2rem, 6cqw, 1.55rem);
      text-transform: uppercase;
      text-shadow: 0 0 18px rgba(53, 234, 255, 0.5);
    }

    .settings-row {
      display: grid;
      gap: 8px;
    }

    .settings-label {
      display: flex;
      justify-content: space-between;
      color: rgba(244, 251, 255, 0.82);
      font-weight: 950;
      font-size: clamp(0.78rem, 3.4cqw, 0.92rem);
      text-transform: uppercase;
    }

    .settings-slider {
      width: 100%;
      accent-color: var(--cyan);
    }

    .auth-screen {
      z-index: 20;
      align-content: center;
      justify-items: center;
      background:
        radial-gradient(circle at 50% 20%, rgba(53, 234, 255, 0.18), transparent 40%),
        linear-gradient(180deg, rgba(5, 8, 16, 0.9), rgba(5, 8, 16, 0.98));
    }

    .auth-panel {
      width: min(100%, 350px);
      display: grid;
      gap: 13px;
      padding: 20px;
      border: 1px solid rgba(53, 234, 255, 0.24);
      border-radius: 8px;
      background:
        linear-gradient(145deg, rgba(53, 234, 255, 0.12), rgba(255, 62, 191, 0.08)),
        rgba(5, 8, 16, 0.94);
      box-shadow: 0 0 38px rgba(53, 234, 255, 0.18);
    }

    .auth-panel h2 {
      margin: 0;
    }

    .auth-mode {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .auth-mode button.active {
      border-color: rgba(255, 209, 102, 0.72);
      color: var(--amber);
    }

    .auth-input {
      width: 100%;
      height: 46px;
      border: 1px solid rgba(244, 251, 255, 0.14);
      border-radius: 8px;
      padding: 0 12px;
      background: rgba(244, 251, 255, 0.08);
      color: var(--text);
      font: inherit;
      font-weight: 850;
      outline: none;
    }

    .auth-input:focus {
      border-color: rgba(53, 234, 255, 0.68);
      box-shadow: 0 0 18px rgba(53, 234, 255, 0.16);
    }

    .auth-status {
      min-height: 20px;
      color: rgba(255, 209, 102, 0.9);
      font-weight: 850;
      font-size: 0.82rem;
      line-height: 1.3;
    }

    .shop-dialog-panel {
      width: min(100%, 320px);
      display: grid;
      gap: 12px;
      padding: 18px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 8px;
      background: rgba(8, 10, 18, 0.9);
      box-shadow: 0 0 34px rgba(53, 234, 255, 0.18);
    }

    .shop-preview {
      width: 64px;
      height: 46px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: var(--swatch);
      box-shadow: 0 0 24px color-mix(in srgb, var(--swatch) 62%, transparent);
    }

    .shop-preview canvas {
      width: 64px;
      height: 52px;
      display: block;
    }

    .shop-dialog-title {
      margin: 0;
      font-weight: 950;
      font-size: clamp(1.25rem, 6cqw, 1.65rem);
      text-transform: uppercase;
    }

    .shop-dialog-price {
      color: var(--amber);
      font-weight: 950;
      text-shadow: 0 0 14px rgba(255, 209, 102, 0.62);
    }

    .placeholder-copy {
      margin: 18px 0 0;
      max-width: 28ch;
      color: rgba(244, 251, 255, 0.78);
      font-size: clamp(0.95rem, 4.2cqw, 1.1rem);
      line-height: 1.45;
    }

    .leaderboard-switcher {
      display: grid;
      grid-template-columns: 46px minmax(0, 1fr) 46px;
      align-items: center;
      gap: 10px;
      margin-top: 22px;
    }

    .leaderboard-arrow {
      width: 46px;
      height: 46px;
      padding: 0;
      font-size: 1.5rem;
      line-height: 1;
    }

    .leaderboard-mode {
      min-height: 58px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(53, 234, 255, 0.22);
      border-radius: 8px;
      background: rgba(244, 251, 255, 0.055);
      color: var(--text);
      font-weight: 950;
      font-size: clamp(1.05rem, 5.2cqw, 1.45rem);
      text-transform: uppercase;
      text-align: center;
      text-shadow: 0 0 18px rgba(53, 234, 255, 0.46);
    }

    .leaderboard-list {
      display: grid;
      gap: 10px;
      margin-top: 18px;
    }

    .leaderboard-row {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      align-items: center;
      gap: 10px;
      padding: 12px;
      border: 1px solid rgba(255, 209, 102, 0.18);
      border-radius: 8px;
      background:
        linear-gradient(135deg, rgba(255, 209, 102, 0.11), rgba(53, 234, 255, 0.055)),
        rgba(244, 251, 255, 0.04);
      box-shadow: 0 0 18px rgba(255, 209, 102, 0.08);
    }

    .leaderboard-row.current-player {
      border-color: rgba(53, 234, 255, 0.48);
      background:
        linear-gradient(135deg, rgba(53, 234, 255, 0.16), rgba(255, 209, 102, 0.08)),
        rgba(244, 251, 255, 0.055);
      box-shadow: 0 0 22px rgba(53, 234, 255, 0.16);
    }

    .leaderboard-rank {
      color: var(--amber);
      font-weight: 950;
      font-size: clamp(0.9rem, 4.2cqw, 1.08rem);
      text-shadow: 0 0 12px rgba(255, 209, 102, 0.55);
    }

    .leaderboard-name {
      min-width: 0;
      color: var(--text);
      font-weight: 950;
      font-size: clamp(0.88rem, 4cqw, 1.02rem);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      text-transform: uppercase;
    }

    .leaderboard-score {
      color: rgba(244, 251, 255, 0.86);
      font-weight: 950;
      font-size: clamp(0.86rem, 3.9cqw, 1rem);
      white-space: nowrap;
    }

    .game-over-score {
      margin-top: 18px;
      color: var(--amber);
      font-weight: 900;
      text-transform: uppercase;
      text-shadow: 0 0 18px rgba(255, 209, 102, 0.78), 0 0 34px rgba(255, 62, 191, 0.34);
    }

    .game-over-score .score-label {
      display: block;
      color: rgba(244, 251, 255, 0.7);
      font-size: clamp(0.78rem, 3.6cqw, 1rem);
      letter-spacing: 0.12em;
    }

    .game-over-score .score-number {
      display: block;
      color: var(--amber);
      font-size: clamp(2.6rem, 17cqw, 5.4rem);
      line-height: 0.92;
    }

    .game-over-score .combo-line {
      display: block;
      margin-top: 8px;
      color: var(--cyan);
      font-size: clamp(1.15rem, 6.6cqw, 2rem);
      text-shadow: 0 0 20px rgba(53, 234, 255, 0.76);
    }

    .game-over-score .star-line {
      display: block;
      margin-top: 8px;
      color: var(--amber);
      font-size: clamp(1.05rem, 5.8cqw, 1.7rem);
      text-shadow: 0 0 18px rgba(255, 209, 102, 0.84);
    }

    .combo-badge {
      position: absolute;
      top: 22%;
      left: 50%;
      z-index: 5;
      width: max-content;
      max-width: calc(100% - 32px);
      padding: 0;
      border: 0;
      background: transparent;
      color: var(--text);
      font-weight: 950;
      font-size: clamp(1.35rem, 9cqw, 3.2rem);
      line-height: 0.92;
      text-align: center;
      text-transform: uppercase;
      text-shadow: 0 0 28px rgba(255, 209, 102, 0.8);
      pointer-events: none;
      opacity: 0;
      transform: translate(-50%, -10px) scale(0.92);
    }

    .combo-badge.show {
      animation: combo-pop 700ms ease-out both;
    }

    .combo-badge.bad {
      color: #d7e2ff;
      text-shadow: 0 0 26px rgba(112, 78, 255, 0.92);
    }

    @keyframes combo-pop {
      0% {
        opacity: 0;
        transform: translate(-50%, 8px) scale(0.86);
      }

      18% {
        opacity: 1;
        transform: translate(-50%, 0) scale(1.04);
      }

      72% {
        opacity: 1;
        transform: translate(-50%, -8px) scale(1);
      }

      100% {
        opacity: 0;
        transform: translate(-50%, -24px) scale(0.96);
      }
    }

    .screen h2 {
      margin: 0;
      font-size: clamp(2rem, 10cqw, 3.2rem);
      line-height: 0.95;
      text-transform: uppercase;
      text-shadow: 0 0 22px rgba(255, 62, 191, 0.62);
    }

    button {
      appearance: none;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 8px;
      padding: 14px 18px;
      background: linear-gradient(135deg, rgba(53, 234, 255, 0.96), rgba(168, 255, 104, 0.92));
      color: #061016;
      font: inherit;
      font-weight: 900;
      font-size: clamp(0.95rem, 4.4cqw, 1.15rem);
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: 0 0 26px rgba(53, 234, 255, 0.34);
    }

    .secondary-button {
      background: rgba(244, 251, 255, 0.08);
      color: var(--text);
      border-color: rgba(255, 255, 255, 0.16);
      box-shadow: inset 0 0 18px rgba(255, 255, 255, 0.03), 0 0 20px rgba(53, 234, 255, 0.08);
    }

    .pause-button {
      position: absolute;
      left: 12px;
      bottom: 12px;
      z-index: 3;
      width: 42px;
      height: 42px;
      padding: 0;
      border-radius: 8px;
      background: rgba(5, 8, 16, 0.34);
      color: var(--text);
      font-size: 1rem;
      line-height: 1;
      box-shadow: 0 0 18px rgba(53, 234, 255, 0.16);
    }

    .item-hud {
      position: absolute;
      left: 58px;
      right: 12px;
      bottom: 12px;
      z-index: 3;
      display: grid;
      gap: 6px;
      pointer-events: none;
    }

    .item-effect {
      display: grid;
      grid-template-columns: 28px minmax(0, 1fr);
      align-items: center;
      gap: 8px;
      max-width: 220px;
      color: var(--text);
      font-weight: 950;
      font-size: clamp(0.62rem, 2.8cqw, 0.76rem);
      text-transform: uppercase;
      text-shadow: 0 0 12px rgba(0, 0, 0, 0.92);
    }

    .item-icon {
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(255, 255, 255, 0.24);
      border-radius: 8px;
      background: rgba(53, 234, 255, 0.12);
      color: var(--cyan);
      box-shadow: 0 0 16px rgba(53, 234, 255, 0.28);
    }

    .item-meter {
      display: grid;
      gap: 4px;
    }

    .item-bar {
      height: 5px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(244, 251, 255, 0.12);
    }

    .item-bar-fill {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--cyan), var(--lime));
      box-shadow: 0 0 12px rgba(53, 234, 255, 0.72);
    }

    .pause-overlay {
      position: absolute;
      inset: 0;
      z-index: 6;
      display: grid;
      align-content: center;
      gap: 14px;
      padding: clamp(22px, 7cqw, 34px);
      background: rgba(5, 8, 16, 0.46);
      backdrop-filter: blur(5px);
      pointer-events: auto;
    }

    .pause-overlay h2 {
      margin: 0 0 14px;
      color: var(--text);
      font-size: clamp(2.2rem, 12cqw, 4rem);
      line-height: 0.92;
      text-align: center;
      text-transform: uppercase;
      text-shadow: 0 0 24px rgba(53, 234, 255, 0.72);
    }

    button:active {
      transform: translateY(1px);
    }

    button:disabled {
      opacity: 0.45;
      cursor: default;
      transform: none;
    }

    @media (hover: hover) and (pointer: fine) {
      body {
        padding: 16px;
      }

      .game-shell {
        position: relative;
        top: auto;
        left: auto;
        width: min(430px, calc(var(--app-width) - 32px), calc((var(--app-height) - 32px) * 390 / 844));
        aspect-ratio: 390 / 844;
        height: auto;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 24px;
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.55), 0 0 44px rgba(53, 234, 255, 0.13);
      }
    }
  </style>
</head>
<body>
  <main class="game-shell" id="gameShell">
    <audio id="backgroundMusic" src="assets/orbit-drift.mp3" preload="auto" loop></audio>
    <audio id="menuMusic" src="assets/sternenstaub-pfad.mp3" preload="auto" loop></audio>
    <audio id="deathExplosionSound" src="assets/player-death-explosion.mp3" preload="auto"></audio>
    <audio id="laserShotSound" src="assets/laser-shot.mp3" preload="auto"></audio>
    <canvas id="game" aria-label="Neon Slingshot Spielfeld"></canvas>

    <header class="hud" id="gameHud" hidden>
      <div class="hud-stat">
        <span class="hud-label">Score</span>
        <span class="hud-value" id="score">0</span>
        <span class="run-stars" id="runStars">★ 0</span>
      </div>
      <div class="hud-stat">
        <span class="hud-label">Combo</span>
        <span class="hud-value" id="combo">x1</span>
        <span class="combo-progress" aria-hidden="true">
          <span class="combo-progress-fill" id="comboProgressFill"></span>
        </span>
      </div>
      <div class="hearts" id="lives" aria-label="Leben"></div>
    </header>

    <div class="hunt-target-badge" id="huntTargetStat" hidden>
      <span class="hud-label">Ziel</span>
      <span class="hud-value" id="huntTarget">--</span>
    </div>

    <div class="combo-badge" id="comboBadge" aria-hidden="true"></div>
    <div class="item-hud" id="itemHud" hidden aria-label="Aktive Items"></div>
    <button class="pause-button" id="pauseButton" type="button" aria-label="Pause" hidden>II</button>

    <section class="pause-overlay" id="pauseOverlay" hidden aria-label="Pause">
      <h2>Pause</h2>
      <button id="resumeButton" type="button">Fortsetzen</button>
      <button class="secondary-button" id="pauseRestartButton" type="button">Neustarten</button>
      <button class="secondary-button" id="pauseMenuButton" type="button">Hauptmenü</button>
    </section>

    <section class="screen auth-screen" id="authScreen" hidden aria-label="Account">
      <div class="auth-panel">
        <h2>Account</h2>
        <div class="auth-mode" role="group" aria-label="Account Modus">
          <button class="secondary-button active" id="authLoginTab" type="button">Einloggen</button>
          <button class="secondary-button" id="authRegisterTab" type="button">Neu erstellen</button>
        </div>
        <input class="auth-input" id="authUsername" autocomplete="username" maxlength="18" placeholder="Benutzername" type="text">
        <input class="auth-input" id="authPassword" autocomplete="current-password" maxlength="48" placeholder="Passwort" type="password">
        <button id="authSubmitButton" type="button">Einloggen</button>
        <div class="auth-status" id="authStatus"></div>
      </div>
    </section>

    <section class="screen" id="mainScreen" aria-label="Hauptmenü">
      <button class="settings-button" id="settingsButton" type="button" aria-label="Einstellungen">⚙</button>
      <h1 class="menu-title">Neon<br>Slingshot</h1>
      <div class="username">Spieler: <span id="username">Neon Pilot</span></div>
      <div class="currency-pill">★ <span id="totalStars">0</span></div>
      <div class="menu-actions">
        <button id="playButton" type="button">Classic Spielen</button>
        <button class="secondary-button" data-open-screen="specialModesScreen" type="button">Sondermodi</button>
        <button class="secondary-button" id="challengesMenuButton" data-open-screen="challengesScreen" type="button">Challenges<span class="challenge-alert" id="challengeAlert" hidden></span></button>
        <button class="secondary-button" data-open-screen="leaderboardScreen" type="button">Bestenliste</button>
        <button class="secondary-button" data-open-screen="skinsScreen" type="button">Skins</button>
      </div>
    </section>

    <section class="screen special-modes-screen" id="specialModesScreen" hidden aria-label="Sondermodi">
      <button class="skin-back-button" data-open-screen="mainScreen" type="button" aria-label="Zurück">‹</button>
      <h2>Sondermodi</h2>
      <div class="mode-list" id="modeList"></div>
      <div class="screen-panel">
        <button class="secondary-button" data-open-screen="mainScreen" type="button">Zurück</button>
      </div>
      <section class="mode-info-dialog" id="modeInfoDialog" hidden aria-label="Modus Info">
        <div class="mode-info-panel">
          <h3 class="mode-info-title" id="modeInfoTitle">Modus</h3>
          <p class="mode-info-text" id="modeInfoText"></p>
          <button class="secondary-button" id="closeModeInfoButton" type="button">Verstanden</button>
        </div>
      </section>
    </section>

    <section class="screen challenge-screen" id="challengesScreen" hidden aria-label="Challenges">
      <button class="skin-back-button" data-open-screen="mainScreen" type="button" aria-label="Zurück">‹</button>
      <h2>Challenges</h2>
      <div class="challenge-list" id="challengeList"></div>
      <div class="screen-panel">
        <button class="secondary-button" data-open-screen="mainScreen" type="button">Zurück</button>
      </div>
    </section>

    <section class="screen" id="leaderboardScreen" hidden aria-label="Bestenliste">
      <h2>Bestenliste</h2>
      <div class="leaderboard-switcher">
        <button class="leaderboard-arrow secondary-button" id="leaderboardPrev" type="button" aria-label="Vorheriger Modus">‹</button>
        <div class="leaderboard-mode" id="leaderboardMode">Classic</div>
        <button class="leaderboard-arrow secondary-button" id="leaderboardNext" type="button" aria-label="Nächster Modus">›</button>
      </div>
      <div class="leaderboard-list" id="leaderboardList"></div>
      <div class="screen-panel">
        <button class="secondary-button" data-open-screen="mainScreen" type="button">Zurück</button>
      </div>
    </section>

    <section class="screen shop-screen" id="skinsScreen" hidden aria-label="Skins">
      <button class="skin-back-button" data-open-screen="mainScreen" type="button" aria-label="Zurück">‹</button>
      <h2>Skins</h2>
      <div class="shop-balance">★ <span id="skinStars">0</span></div>
      <div class="skin-combo-preview">
        <span class="skin-combo-label">Vorschau</span>
        <canvas id="skinComboPreview" width="720" height="320" aria-label="Skin Kombination Vorschau"></canvas>
      </div>
      <div class="shop-section">
        <div class="shop-section-title">Farben</div>
        <div class="color-grid" id="colorGrid"></div>
      </div>
      <div class="shop-section">
        <div class="shop-section-title">Formen</div>
        <div class="skin-slot-grid" id="shapeGrid"></div>
      </div>
      <div class="shop-section">
        <div class="shop-section-title">Trail</div>
        <div class="skin-slot-grid" id="trailGrid"></div>
      </div>
      <div class="screen-panel shop-done-panel">
        <button class="secondary-button" data-open-screen="mainScreen" type="button">Fertig</button>
      </div>
    </section>

    <section class="shop-dialog" id="colorBuyDialog" hidden aria-label="Farbe kaufen">
      <div class="shop-dialog-panel">
        <div class="shop-preview" id="colorBuyPreview"></div>
        <p class="shop-dialog-title" id="colorBuyTitle">Farbe</p>
        <div class="shop-dialog-price" id="colorBuyPrice">★ 0</div>
        <button class="secondary-button" id="previewShopButton" type="button">Vorschau</button>
        <button id="buyColorButton" type="button">Kaufen</button>
        <button class="secondary-button" id="cancelColorButton" type="button">Abbrechen</button>
      </div>
    </section>

    <section class="settings-dialog" id="settingsDialog" hidden aria-label="Einstellungen">
      <div class="settings-panel">
        <h3 class="settings-title">Einstellungen</h3>
        <label class="settings-row">
          <span class="settings-label">Musik <span id="musicVolumeValue">50%</span></span>
          <input class="settings-slider" id="musicVolumeSlider" type="range" min="0" max="100" value="50">
        </label>
        <label class="settings-row">
          <span class="settings-label">Sounds <span id="sfxVolumeValue">75%</span></span>

    function ensureAudio() {
      const AudioContextClass = window.AudioContext || window.webkitAudioContext;
      if (!AudioContextClass) return null;
      if (!audioCtx) {
        audioCtx = new AudioContextClass();
      }
      if (audioCtx.state === "suspended") {
        audioCtx.resume();
      }
      ensureMusicRouting(audioCtx);
      audioUnlocked = true;
      return audioCtx;
    }

    function ensureMusicRouting(ctxAudio) {
      if (musicRoutingActive) return;
      try {
        backgroundMusicGain = ctxAudio.createGain();
        menuMusicGain = ctxAudio.createGain();
        ctxAudio.createMediaElementSource(backgroundMusic).connect(backgroundMusicGain);
        ctxAudio.createMediaElementSource(menuMusic).connect(menuMusicGain);
        backgroundMusicGain.connect(ctxAudio.destination);
        menuMusicGain.connect(ctxAudio.destination);
        musicRoutingActive = true;
        applyVolumeSettings();
      } catch {
        musicRoutingActive = false;
      }
    }

    function ensureSfxOutput(ctxAudio) {
      if (sfxOutput) return sfxOutput;
      const master = ctxAudio.createGain();
      const compressor = ctxAudio.createDynamicsCompressor();
      master.gain.value = 0.92;
      compressor.threshold.value = -12;
      compressor.knee.value = 24;
      compressor.ratio.value = 3;
      compressor.attack.value = 0.008;
      compressor.release.value = 0.16;
      master.connect(compressor);
      compressor.connect(ctxAudio.destination);
      sfxOutput = master;
      return sfxOutput;
    }

    function applyVolumeSettings() {
      const musicLevel = musicVolume * musicMasterVolume;
      if (musicRoutingActive) {
        backgroundMusic.volume = 1;
        menuMusic.volume = 1;
        backgroundMusicGain.gain.value = musicLevel;

      } else {

    }

    function tone(frequency, duration = 0.08, options = {}) {
      if (!audioUnlocked && !options.force) return;
      const ctxAudio = ensureAudio();
      if (!ctxAudio) return;
      const now = ctxAudio.currentTime;
      const osc = ctxAudio.createOscillator();
      const gain = ctxAudio.createGain();
      osc.type = options.type || "sine";
      osc.frequency.setValueAtTime(frequency, now);
      if (options.to) {
        osc.frequency.exponentialRampToValueAtTime(Math.max(30, options.to), now + duration);
      }
      const attack = Math.min(0.018, duration * 0.32);
      const releaseStart = Math.max(now + attack + 0.006, now + duration - Math.min(0.035, duration * 0.45));
      const peak = (options.volume || 0.05) * sfxVolume;
      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.linearRampToValueAtTime(peak, now + attack);
      gain.gain.setValueAtTime(peak, releaseStart);
      gain.gain.linearRampToValueAtTime(0.0001, now + duration);
      osc.connect(gain);
      gain.connect(ensureSfxOutput(ctxAudio));
      osc.start(now);
      osc.stop(now + duration + 0.02);
    }

    function noiseBurst(duration = 0.08, options = {}) {
      if (!audioUnlocked && !options.force) return;
      const ctxAudio = ensureAudio();
      if (!ctxAudio) return;
      const length = Math.max(1, Math.floor(ctxAudio.sampleRate * duration));
      const buffer = ctxAudio.createBuffer(1, length, ctxAudio.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i = 0; i < length; i++) {
        data[i] = (Math.random() * 2 - 1) * (1 - i / length);
      }
      const source = ctxAudio.createBufferSource();
      const gain = ctxAudio.createGain();
      const filter = ctxAudio.createBiquadFilter();
      const now = ctxAudio.currentTime;
      filter.type = options.filter || "highpass";
      filter.frequency.value = options.frequency || 900;
      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.linearRampToValueAtTime((options.volume || 0.035) * sfxVolume, now + Math.min(0.014, duration * 0.3));
      gain.gain.linearRampToValueAtTime(0.0001, now + duration);
      source.buffer = buffer;
      source.connect(filter);
      filter.connect(gain);
      gain.connect(ensureSfxOutput(ctxAudio));
      source.start(now);
    }

    async function apiRequest(path, options = {}) {
      const headers = { "content-type": "application/json", ...(options.headers || {}) };
      if (authToken) headers.authorization = `Bearer ${authToken}`;
      const response = await fetch(path, { ...options, headers });
      const payload = await response.json().catch(() => ({}));
      if (!response.ok) throw new Error(payload.error || "Server nicht erreichbar.");
      return payload;
    }

    function scheduleCloudSave(options = {}) {
      if (!cloudEnabled || !authToken || applyingCloudSave) return;
      cloudSaveDirty = true;
      clearTimeout(cloudSaveTimer);
      if (options.immediate) {
        syncCloudSave();
        return;
      }
      cloudSaveTimer = setTimeout(syncCloudSave, 450);
    }

    async function syncCloudSave(options = {}) {
      if (!cloudEnabled || !authToken) return false;
      if (applyingCloudSave && !options.force) return false;
      if (cloudSaveInFlight) {
        cloudSaveRequested = true;
        return cloudSaveInFlight;
      }
      clearTimeout(cloudSaveTimer);
      cloudSaveDirty = false;
      cloudSaveInFlight = (async () => {
        try {
          await apiRequest("/api/save", {
            method: "POST",
            body: JSON.stringify(cloudSavePayload())
          });
          return true;
        } catch (error) {
          cloudSaveDirty = true;
          console.warn(error);
          return false;
        } finally {
          cloudSaveInFlight = null;
          if (cloudSaveRequested || cloudSaveDirty) {
            cloudSaveRequested = false;
            scheduleCloudSave();
          }
        }
      })();
      return cloudSaveInFlight;
    }

    function flushCloudSaveBeacon() {
      if (!cloudEnabled || !authToken || !cloudSaveDirty || !navigator.sendBeacon) return false;
      clearTimeout(cloudSaveTimer);
      const body = JSON.stringify(cloudSavePayload(true));
      const sent = navigator.sendBeacon("/api/save", new Blob([body], { type: "application/json" }));
      if (sent) cloudSaveDirty = false;
      return sent;
    }

    async function refreshCloudSave(options = {}) {
      const force = Boolean(options.force);
      if (!cloudEnabled || !authToken || state.running) return true;
      const now = Date.now();
      if (!force && now - lastCloudRefreshAt < 4000) return true;
      if (cloudRefreshPromise) return cloudRefreshPromise;
      cloudRefreshPromise = (async () => {
        try {
          if (cloudSaveDirty) {
            const saved = await syncCloudSave({ force: true });
            if (!saved) return false;
          }
          const payload = await apiRequest("/api/me");
          playerName = payload.user.username || playerName;
          localStorage.setItem("neonSlingshotUsername", playerName);
          usernameEl.textContent = playerName;
          applySaveProfile(saveWithLeaderboard(payload.user.save || {}, payload.user.leaderboard || {}));
          lastCloudRefreshAt = Date.now();
          return true;
        } catch (error) {
          console.warn(error);
          if (force) {
            showComboBadge("Cloud-Sync fehlgeschlagen", true);
          }
          return false;
        } finally {
          cloudRefreshPromise = null;
        }
      })();
      return cloudRefreshPromise;
    }

        itemsBest: Math.max(Number(save.itemsBest || 0), Number(leaderboard.items || 0)),
        flowBest: Math.max(Number(save.flowBest || 0), Number(leaderboard.flow || 0)),

    function finishAuthSession(user, token) {
      authToken = token || authToken;
      if (authToken) localStorage.setItem("neonSlingshotAuthToken", authToken);
      playerName = user.username || "Neon Pilot";
      localStorage.setItem("neonSlingshotUsername", playerName);

      applySaveProfile(saveWithLeaderboard(user.save || {}, user.leaderboard || {}));

    async function submitAuth() {
      const username = authUsername.value.trim();
      const password = authPassword.value;
      if (!username || !password) {
        authStatus.textContent = "Bitte Name und Passwort eingeben.";
        return;
      }
      authSubmitButton.disabled = true;
      authStatus.textContent = authMode === "register" ? "Account wird erstellt..." : "Login läuft...";
      try {
        const payload = authMode === "register"
          ? await apiRequest("/api/register", {
            method: "POST",
            body: JSON.stringify({ username, password, save: exportSaveProfile() })
          })
          : await apiRequest("/api/login", {
            method: "POST",
            body: JSON.stringify({ username, password })
          });
        finishAuthSession(payload.user, payload.token);
      } catch (error) {
        authStatus.textContent = error.message;
      } finally {

    function previewColorById(colorId, time = performance.now()) {

    function launchSkinComboPreviewShot(w, h, time) {
      const margin = 84;
      const centerX = w * 0.5;
      const centerY = h * 0.52;
      const angle = rand(0, TAU);
      const startDistance = Math.max(w, h) * 0.48 + margin;
      const startX = centerX - Math.cos(angle) * startDistance;
      const startY = centerY - Math.sin(angle) * startDistance;
      const targetX = centerX + rand(-w * 0.045, w * 0.045);
      const targetY = centerY + rand(-h * 0.07, h * 0.07);
      const dx = targetX - startX;
      const dy = targetY - startY;
      const distance = Math.max(1, hypot(dx, dy));
      const force = clamp(distance * 1.15, 380, 620);
      skinComboMotion.x = startX;
      skinComboMotion.y = startY;
      skinComboMotion.vx = (dx / distance) * force;
      skinComboMotion.vy = (dy / distance) * force;
      skinComboMotion.trail = [];
      skinComboMotion.nextShotAt = time + 100000;
    }

    function updateSkinComboMotion(w, h, time) {
      if (!skinComboMotion.lastTime) {
        skinComboMotion.lastTime = time;
        skinComboMotion.nextShotAt = 0;
      }
      const dt = clamp((time - skinComboMotion.lastTime) / 1000, 0, 0.04);
      skinComboMotion.lastTime = time;
      const margin = 120;
      const out =
        skinComboMotion.x < -margin ||
        skinComboMotion.x > w + margin ||
        skinComboMotion.y < -margin ||
        skinComboMotion.y > h + margin;
      if (out || skinComboMotion.nextShotAt <= 0) {
        launchSkinComboPreviewShot(w, h, time);
      }
      skinComboMotion.x += skinComboMotion.vx * dt;
      skinComboMotion.y += skinComboMotion.vy * dt;
      skinComboMotion.vx *= Math.pow(0.997, dt * 60);
      skinComboMotion.vy *= Math.pow(0.997, dt * 60);
      skinComboMotion.trail.unshift({ x: skinComboMotion.x, y: skinComboMotion.y, life: 0.58, r: 28 });
      skinComboMotion.trail = skinComboMotion.trail.filter((dot) => {
        dot.life -= dt;
        return dot.life > 0;
      }).slice(0, 22);
    }

    function drawSkinComboPreview() {
      const rect = skinComboPreview.getBoundingClientRect();
      const targetWidth = Math.max(1, Math.round(rect.width * (window.devicePixelRatio || 1)));
      const targetHeight = Math.max(1, Math.round(rect.height * (window.devicePixelRatio || 1)));
      if (skinComboPreview.width !== targetWidth || skinComboPreview.height !== targetHeight) {
        skinComboPreview.width = targetWidth;
        skinComboPreview.height = targetHeight;
        skinComboMotion.lastTime = 0;
        skinComboMotion.nextShotAt = 0;
        skinComboMotion.trail = [];
      }
      const time = performance.now();
      const { colorId, shapeId, trailId } = skinPreviewSelection();
      const previewColor = previewColorById(colorId, time);
      const w = skinComboPreview.width;
      const h = skinComboPreview.height;
      updateSkinComboMotion(w, h, time);
      const cx = skinComboMotion.x;
      const cy = skinComboMotion.y;
      skinComboCtx.clearRect(0, 0, w, h);

      const previewGlow = previewColor.glow.startsWith("hsl(")
        ? previewColor.glow.replace("hsl(", "hsla(").replace(")", " / 0.16)")
        : "rgba(53, 234, 255, 0.13)";
      const glow = skinComboCtx.createRadialGradient(cx, cy, 5, cx, cy, w * 0.44);
      glow.addColorStop(0, previewGlow);
      glow.addColorStop(1, "rgba(0, 0, 0, 0)");
      skinComboCtx.fillStyle = glow;
      skinComboCtx.fillRect(0, 0, w, h);

      skinComboCtx.save();
      for (let i = skinComboMotion.trail.length - 1; i >= 0; i--) {
        const dot = skinComboMotion.trail[i];
        const alpha = dot.life / 0.58;
        drawTrailStyle(skinComboCtx, trailId, dot.x, dot.y, dot.r * (0.56 + alpha * 0.44), alpha * 0.42, i, time);
      }
      skinComboCtx.restore();

      skinComboCtx.save();
      skinComboCtx.translate(cx, cy);
      skinComboCtx.shadowBlur = 30;
      skinComboCtx.shadowColor = previewColor.glow;
      skinComboCtx.fillStyle = previewColor.core;
      drawPlayerShape(shapeId, 28, time, skinComboCtx);
      skinComboCtx.fill();
      skinComboCtx.lineWidth = 4;
      skinComboCtx.strokeStyle = previewColor.glow;
      skinComboCtx.stroke();
      drawPlayerShapeDetails(shapeId, 28, time, previewColor, skinComboCtx);
      skinComboCtx.restore();

      skinComboCtx.save();
      skinComboCtx.globalAlpha = 0.78;
      skinComboCtx.shadowBlur = 12;
      skinComboCtx.shadowColor = previewColor.glow;
      skinComboCtx.strokeStyle = previewColor.glow;
      skinComboCtx.lineWidth = 3;
      skinComboCtx.beginPath();
      skinComboCtx.arc(cx, cy, 38, 0, TAU);
      skinComboCtx.stroke();
      skinComboCtx.restore();
    }

    function drawTrailStyle(targetCtx, trailId, x, y, radius, alpha, index, time) {
      const t = time / 1000;
      targetCtx.globalAlpha = alpha;
      if (trailId === "rainbow") {
        const hue = (t * 180 + index * 34) % 360;
        targetCtx.fillStyle = `hsl(${hue} 100% 62%)`;
        targetCtx.shadowColor = `hsl(${hue} 100% 62%)`;
        targetCtx.shadowBlur = 18;
        targetCtx.beginPath();
        targetCtx.arc(x, y, radius, 0, TAU);
        targetCtx.fill();
      } else if (trailId === "sparks") {
        const crackle = Math.floor(t * 18 + index * 3);
        const hueBase = 38 + ((index * 47 + crackle * 19) % 34);
        targetCtx.shadowColor = `hsl(${hueBase} 100% 64%)`;
        targetCtx.shadowBlur = 12;
        for (let i = 0; i < 4; i++) {
          const seed = Math.sin((index + 1) * 91.7 + (i + 3) * 37.2 + crackle * 13.1) * 43758.5453;
          const random = seed - Math.floor(seed);
          const angle = t * (5.2 + random * 2.4) + index * 0.8 + i * 1.72 + random * TAU;
          const distance = radius * (0.34 + random * 1.15);
          const sparkRadius = Math.max(1.1, radius * (0.13 + random * 0.18));
          targetCtx.globalAlpha = alpha * (0.48 + random * 0.5);
          targetCtx.fillStyle = i === 0 ? "#fff4b8" : `hsl(${hueBase + i * 8} 100% ${58 + random * 18}%)`;
          targetCtx.beginPath();
          targetCtx.arc(x + Math.cos(angle) * distance, y + Math.sin(angle) * distance, sparkRadius, 0, TAU);
          targetCtx.fill();
        }
        if (index % 2 === 0) {
          const angle = t * 6.5 + index * 1.4;
          targetCtx.globalAlpha = alpha * 0.42;
          targetCtx.strokeStyle = "#fff0a8";
          targetCtx.lineWidth = Math.max(1, radius * 0.09);
          targetCtx.beginPath();
          targetCtx.moveTo(x, y);
          targetCtx.lineTo(x + Math.cos(angle) * radius * 1.35, y + Math.sin(angle) * radius * 1.35);
          targetCtx.stroke();
        }
      } else if (trailId === "waves") {
        const pulse = 0.5 + Math.sin(t * 7 + index * 0.8) * 0.5;
        targetCtx.shadowColor = "#35eaff";
        targetCtx.shadowBlur = 10 + pulse * 4;
        targetCtx.strokeStyle = "#35eaff";
        targetCtx.lineWidth = Math.max(1.8, radius * 0.17);
        targetCtx.beginPath();
        targetCtx.arc(x, y, radius * (0.98 + pulse * 0.24), 0, TAU);
        targetCtx.stroke();
        if (index % 3 === 0) {
          targetCtx.globalAlpha = alpha * 0.52;
          targetCtx.shadowBlur = 0;
          targetCtx.strokeStyle = "#a8ff68";
          targetCtx.lineWidth = Math.max(1, radius * 0.09);
          targetCtx.beginPath();
          targetCtx.arc(x, y, radius * (1.28 + pulse * 0.14), Math.PI * 0.18 + t + index, Math.PI * 1.1 + t + index);
          targetCtx.stroke();
        }
      } else if (trailId === "fire") {
        const gradient = targetCtx.createRadialGradient(x - radius * 0.3, y - radius * 0.3, radius * 0.1, x, y, radius);
        gradient.addColorStop(0, "#fff0b8");
        gradient.addColorStop(0.45, "#ff8a3d");
        gradient.addColorStop(1, "#ff3e3e");
        targetCtx.fillStyle = gradient;
        targetCtx.shadowColor = "#ff8a3d";
        targetCtx.shadowBlur = 16;
        targetCtx.beginPath();
        targetCtx.ellipse(x, y, radius * 0.78, radius * 1.16, Math.sin(t + index) * 0.7, 0, TAU);
        targetCtx.fill();
      } else if (trailId === "comet") {
        targetCtx.fillStyle = "#d8fbff";
        targetCtx.shadowColor = "#35eaff";
        targetCtx.shadowBlur = 20;
        targetCtx.beginPath();
        targetCtx.ellipse(x, y, radius * 1.35, radius * 0.58, 0, 0, TAU);
        targetCtx.fill();
      } else if (trailId === "ghost") {
        targetCtx.strokeStyle = `rgba(216, 251, 255, ${alpha})`;
        targetCtx.shadowColor = "#d8fbff";
        targetCtx.shadowBlur = 10;
        targetCtx.lineWidth = 2;
        targetCtx.beginPath();
        targetCtx.arc(x, y, radius, 0, TAU);
        targetCtx.stroke();
      } else if (trailId === "pixel") {
        targetCtx.fillStyle = "#35eaff";
        targetCtx.shadowColor = "#35eaff";
        targetCtx.shadowBlur = 8;
        const size = Math.max(3, radius * 0.7);
        targetCtx.fillRect(x - size / 2, y - size / 2, size, size);
      } else if (trailId === "plasma") {
        const hue = index % 2 === 0 ? 276 + Math.sin(t * 5 + index) * 8 : 318 + Math.sin(t * 4 + index) * 10;
        const pulse = 0.55 + Math.sin(t * 9 + index * 1.4) * 0.45;
        targetCtx.shadowColor = `hsl(${hue} 100% 66%)`;
        targetCtx.shadowBlur = 15 + pulse * 8;
        targetCtx.fillStyle = index % 4 === 0 ? "#35eaff" : `hsl(${hue} 100% ${58 + pulse * 10}%)`;
        targetCtx.beginPath();
        targetCtx.ellipse(
          x,
          y + Math.sin(t * 8 + index) * radius * 0.22,
          radius * (0.92 + pulse * 0.2),
          radius * (0.48 + pulse * 0.12),
          Math.sin(t * 3 + index) * 0.8,
          0,
          TAU
        );
        targetCtx.fill();
        if (index % 3 === 0) {
          targetCtx.globalAlpha = alpha * 0.68;
          targetCtx.shadowBlur = 0;
          targetCtx.strokeStyle = index % 2 === 0 ? "#ff3ebf" : "#35eaff";
          targetCtx.lineWidth = Math.max(1.1, radius * 0.12);
          targetCtx.beginPath();
          targetCtx.moveTo(x - Math.cos(t + index) * radius * 0.9, y - Math.sin(t * 1.4 + index) * radius * 0.45);
          targetCtx.lineTo(x + Math.cos(t * 1.2 + index) * radius * 0.95, y + Math.sin(t + index) * radius * 0.46);
          targetCtx.stroke();
        }
      } else {
        targetCtx.fillStyle = trailColor.glow;
        targetCtx.shadowColor = trailColor.glow;
        targetCtx.shadowBlur = 20;
        targetCtx.beginPath();
        targetCtx.arc(x, y, radius, 0, TAU);
        targetCtx.fill();
      }
      targetCtx.globalAlpha = 1;
    }

    function renderTrailPreviews() {
      trailGrid.querySelectorAll("[data-trail-preview]").forEach((preview) => {
        const previewCtx = preview.getContext("2d");
        const trailId = preview.dataset.trailPreview;
        const time = performance.now();
        previewCtx.clearRect(0, 0, preview.width, preview.height);
        previewCtx.save();
        for (let i = 8; i >= 0; i--) {
          const x = 18 + i * 10;
          const y = preview.height / 2 + Math.sin(i * 0.8 + time / 260) * 8;
          const alpha = (1 - i / 10) * 0.72;
          drawTrailStyle(previewCtx, trailId, x, y, 13 - i * 0.65, alpha, i, time);
        }
        previewCtx.restore();
      });
    }

      if (state.screen !== "skinsScreen") {

      renderTrailPreviews();
      drawSkinComboPreview();
      skinPreviewFrame = requestAnimationFrame(animateSkinPreviews);

        skinPreviewFrame = requestAnimationFrame(animateSkinPreviews);
      }
